metadata:
  category: "finance"
  subcategory: "sat-declaration"
  workflow: "resume-pending-single-2025-001-submit"

variables:
  DEBUG_PORT: 9333
  RUN_MINIMIZED: false
  OUTPUT_DIR: "${PLAYBOOK_DIR}\\playbooks\\output"
  SAT_PROFILE_URL: "https://pstcdypisr.clouda.sat.gob.mx/Declaracion/Temporales"
  SKILL_NAV_SUPERCONTROL_PLAYBOOK: "${PLAYBOOK_DIR}\\..\\waiba-navigation-supercontrol\\playbooks\\01_supercontrol\\playbook.yml"
  SAT_USE_NAV_SUPERCONTROL: true
  SAT_NAV_ENABLE_OCR: false
  SAT_TARGET_YEAR: 2025
  SAT_TARGET_MONTH: "001"
  SAT_DO_PREVIEW: true
  SAT_DO_SUBMIT: true
  SAT_VISUAL_CHECKPOINTS: true
  AUTO_RECOVER_UNCONFIRMED: false
  AUTO_RECOVERY_VISION: false
  AUTO_RECOVERY_EXTERNAL_VISION: false

steps:
  prod:
    - name: Default WAIBA home when missing
      if_not: "${WAIBA_HOME}"
      action: Set
      params:
        name: WAIBA_HOME
        value: "C:\\Users\\jecha\\.waiba"

    - name: Default SAT skill root when missing
      if_not: "${SKILL_SAT_TAX_ROOT}"
      action: Set
      params:
        name: SKILL_SAT_TAX_ROOT
        value: "${PLAYBOOK_DIR}"

    - name: Default SAT playbook directory when missing
      if_not: "${SKILL_SAT_TAX_PLAYBOOK_DIR}"
      action: Set
      params:
        name: SKILL_SAT_TAX_PLAYBOOK_DIR
        value: "${SKILL_SAT_TAX_ROOT}\\playbooks"

    - name: Default SAT assets directory when missing
      if_not: "${SKILL_SAT_TAX_ASSETS_DIR}"
      action: Set
      params:
        name: SKILL_SAT_TAX_ASSETS_DIR
        value: "${SKILL_SAT_TAX_PLAYBOOK_DIR}\\assets"

    - name: Ensure SAT output directory
      action: FS.EnsureDir
      params:
        path: "${OUTPUT_DIR}\\sat\\declarations\\${SAT_TARGET_YEAR}"

    - name: Ensure SAT acuse directory
      action: FS.EnsureDir
      params:
        path: "${OUTPUT_DIR}\\sat\\declarations\\${SAT_TARGET_YEAR}\\acuse"

    - name: Ensure SAT preview directory
      action: FS.EnsureDir
      params:
        path: "${OUTPUT_DIR}\\sat\\declarations\\${SAT_TARGET_YEAR}\\preview"

    - name: Configure supercontrol NAV_URL for pending resume
      if: "${SAT_USE_NAV_SUPERCONTROL}"
      action: Set
      params:
        name: NAV_URL
        value: "${SAT_PROFILE_URL}"

    - name: Configure supercontrol open URL for pending resume
      if: "${SAT_USE_NAV_SUPERCONTROL}"
      action: Set
      params:
        name: NAV_START_OPEN_URL
        value: "${SAT_PROFILE_URL}"

    - name: Configure supercontrol host expectation for pending resume
      if: "${SAT_USE_NAV_SUPERCONTROL}"
      action: Set
      params:
        name: NAV_EXPECT_HOST_ENDSWITH
        value: "sat.gob.mx"

    - name: Configure supercontrol target domain for pending resume
      if: "${SAT_USE_NAV_SUPERCONTROL}"
      action: Set
      params:
        name: NAV_TARGET_URL_CONTAINS
        value: "sat.gob.mx|pstcdypisr.clouda.sat.gob.mx|http"

    - name: Configure supercontrol tab policy for pending resume
      if: "${SAT_USE_NAV_SUPERCONTROL}"
      action: Set
      params:
        name: NAV_REUSE_EXISTING_TAB
        value: true

    - name: Configure supercontrol no-new-tab for pending resume
      if: "${SAT_USE_NAV_SUPERCONTROL}"
      action: Set
      params:
        name: NAV_ALLOW_NEW_TAB
        value: false

    - name: Configure supercontrol hooks for pending resume
      if: "${SAT_USE_NAV_SUPERCONTROL}"
      action: Set
      params:
        name: NAV_ENABLE_PRE_HOOK
        value: false

    - name: Configure supercontrol post hook for pending resume
      if: "${SAT_USE_NAV_SUPERCONTROL}"
      action: Set
      params:
        name: NAV_ENABLE_POST_HOOK
        value: false

    - name: Configure supercontrol JS patch for pending resume
      if: "${SAT_USE_NAV_SUPERCONTROL}"
      action: Set
      params:
        name: NAV_ENABLE_JS_PATCH
        value: false

    - name: Configure supercontrol OCR toggle for pending resume
      if: "${SAT_USE_NAV_SUPERCONTROL}"
      action: Set
      params:
        name: NAV_ENABLE_OCR
        value: "${SAT_NAV_ENABLE_OCR}"

    - name: Configure supercontrol evidence label for pending resume
      if: "${SAT_USE_NAV_SUPERCONTROL}"
      action: Set
      params:
        name: NAV_CAPTURE_LABEL
        value: "sat_resume_pending_${SAT_TARGET_YEAR}_${SAT_TARGET_MONTH}"

    - name: Ensure SAT browser session via navigation supercontrol
      if: "${SAT_USE_NAV_SUPERCONTROL}"
      playbook: "${SKILL_NAV_SUPERCONTROL_PLAYBOOK}"

    - name: Ensure SAT browser session is connected (fallback native)
      if_not: "${SAT_USE_NAV_SUPERCONTROL}"
      action: Helium.StartEdge
      params:
        port: "${DEBUG_PORT}"
        open_url: "${SAT_PROFILE_URL}"
        reuse_existing_tab: true
        allow_new_tab: false
        target_type: page
        target_url_contains: "pstcdypisr.clouda.sat.gob.mx"
        exclude_url_contains: "devtools://|edge://|chrome://"
        minimize_window: "${RUN_MINIMIZED}"

    - name: Wait until SAT domain is ready
      action: Helium.WaitUntilUrl
      params:
        port: "${DEBUG_PORT}"
        timeout_secs: 30
        host_endswith: "sat.gob.mx"

    - name: Navigate to Temporales
      action: CDP.Navigate
      params:
        port: "${DEBUG_PORT}"
        url: "${SAT_PROFILE_URL}"
        wait_ms: 2200
        wait_until: "interactive"

    - name: Set visual label (v01_temporales)
      if: "${SAT_VISUAL_CHECKPOINTS}"
      action: Set
      params:
        name: SAT_VISUAL_LABEL
        value: "v01_temporales"

    - name: Visual checkpoint v01_temporales
      if: "${SAT_VISUAL_CHECKPOINTS}"
      playbook: "${PLAYBOOK_DIR}\\playbook_visual_checkpoint.yml"

    - name: Detect SAT login wall
      action: CDP.EvaluateJson
      register: sat_login_wall
      params:
        port: "${DEBUG_PORT}"
        expression: |
          (() => {
            const url = String(location.href || "");
            const title = String(document.title || "");
            const body = String((document.body && document.body.innerText) || "").toLowerCase();
            const onLogin =
              /loginda\.siat\.sat\.gob\.mx|\/nidp\/wsfed\//i.test(url) ||
              /sat autenticaci[oÃ³]n|acceso por contrase[nÃ±]a|captcha/i.test((title + " " + body).toLowerCase());
            return { ok: true, on_login: onLogin, url, title };
          })()

    - name: Persist SAT login-wall probe
      action: FS.WriteJson
      params:
        path: "${OUTPUT_DIR}\\sat\\declarations\\${SAT_TARGET_YEAR}\\${SAT_TARGET_MONTH}.login_wall.json"
        overwrite: true
        value: "${sat_login_wall}"

    - name: Wait for manual login/captcha resolution (initial checkpoint)
      if: "${sat_login_wall.on_login}"
      action: Helium.WaitUntil
      ignore_errors: true
      register: sat_wait_login_checkpoint
      params:
        port: "${DEBUG_PORT}"
        timeout_secs: 300
        interval_ms: 900
        expression: |
          (() => {
            const u = String(location.href || "");
            const t = String(document.title || "");
            const b = String((document.body && document.body.innerText) || "").toLowerCase();
            const onLogin =
              /loginda\.siat\.sat\.gob\.mx|\/nidp\/wsfed\//i.test(u) ||
              /sat autenticaci[oÃ³]n|acceso por contrase[nÃ±]a|captcha/i.test((t + " " + b).toLowerCase());
            if (onLogin) return false;
            return /pstcdypisr\.clouda\.sat\.gob\.mx\/Declaracion\//i.test(u);
          })()

    - name: Re-check SAT login wall after initial checkpoint
      action: CDP.EvaluateJson
      register: sat_login_wall_after_checkpoint
      params:
        port: "${DEBUG_PORT}"
        expression: |
          (() => {
            const url = String(location.href || "");
            const title = String(document.title || "");
            const body = String((document.body && document.body.innerText) || "").toLowerCase();
            const onLogin =
              /loginda\.siat\.sat\.gob\.mx|\/nidp\/wsfed\//i.test(url) ||
              /sat autenticaci[oÃ³]n|acceso por contrase[nÃ±]a|captcha/i.test((title + " " + body).toLowerCase());
            return { ok: true, on_login: onLogin, url, title };
          })()

    - name: Fail if SAT session is still not authenticated
      if: "${sat_login_wall_after_checkpoint.on_login}"
      action: Fail
      params:
        message: "SAT session remains on login/authentication wall after manual checkpoint."

    - name: Detect Temporales blocking error modal
      action: CDP.EvaluateJson
      register: sat_temporales_error
      params:
        port: "${DEBUG_PORT}"
        expression: |
          (() => {
            const body = String((document.body && document.body.innerText) || "").toLowerCase();
            const title = String(document.title || "");
            const hasError =
              body.includes("an error occurred while processing your request") ||
              body.includes("error.") ||
              body.includes("ocurrio un error") ||
              body.includes("ocurriÃ³ un error");
            return {
              ok: true,
              has_error: hasError,
              url: String(location.href || ""),
              title
            };
          })()

    - name: Persist Temporales error probe
      action: FS.WriteJson
      params:
        path: "${OUTPUT_DIR}\\sat\\declarations\\${SAT_TARGET_YEAR}\\${SAT_TARGET_MONTH}.temporales_error.json"
        overwrite: true
        value: "${sat_temporales_error}"

    - name: Dismiss Temporales error modal (best effort)
      if: "${sat_temporales_error.has_error}"
      ignore_errors: true
      action: Helium.ClickAny
      register: sat_temporales_error_dismiss
      params:
        port: "${DEBUG_PORT}"
        text_candidates: "Aceptar|Cerrar|Close|OK|Ok"
        implicit_wait_ms: 1600
        find_in_page_fallback: true

    - name: Wait after error modal dismiss
      if: "${sat_temporales_error.has_error}"
      action: CDP.Wait
      params:
        ms: 900

    - name: Set visual label (v01b_temporales_recovered)
      if: "${sat_temporales_error.has_error}"
      action: Set
      params:
        name: SAT_VISUAL_LABEL
        value: "v01b_temporales_recovered"

    - name: Visual checkpoint v01b_temporales_recovered
      if: "${sat_temporales_error.has_error}"
      playbook: "${PLAYBOOK_DIR}\\playbook_visual_checkpoint.yml"

    - name: Verify declaration context before pending lookup
      action: CDP.EvaluateJson
      register: sat_decl_context
      params:
        port: "${DEBUG_PORT}"
        expression: |
          (() => {
            const u = String(location.href || "");
            const onDecl = /pstcdypisr\.clouda\.sat\.gob\.mx\/Declaracion\//i.test(u);
            return { ok: true, url: u, on_declaration_context: onDecl };
          })()

    - name: Recover declaration context when redirected away
      if_not: "${sat_decl_context.on_declaration_context}"
      action: CDP.Navigate
      params:
        port: "${DEBUG_PORT}"
        url: "${SAT_PROFILE_URL}"
        wait_ms: 2600
        wait_until: "interactive"

    - name: Verify SAT login wall after context recovery
      action: CDP.EvaluateJson
      register: sat_login_wall_after_recover
      params:
        port: "${DEBUG_PORT}"
        expression: |
          (() => {
            const url = String(location.href || "");
            const title = String(document.title || "");
            const body = String((document.body && document.body.innerText) || "").toLowerCase();
            const onLogin =
              /loginda\.siat\.sat\.gob\.mx|\/nidp\/wsfed\//i.test(url) ||
              /sat autenticaci[oÃ³]n|acceso por contrase[nÃ±]a|captcha/i.test((title + " " + body).toLowerCase());
            return { ok: true, on_login: onLogin, url, title };
          })()

    - name: Persist login-wall-after-recovery probe
      action: FS.WriteJson
      params:
        path: "${OUTPUT_DIR}\\sat\\declarations\\${SAT_TARGET_YEAR}\\${SAT_TARGET_MONTH}.login_wall_after_recover.json"
        overwrite: true
        value: "${sat_login_wall_after_recover}"

    - name: Wait for manual login/captcha resolution (recovery checkpoint)
      if: "${sat_login_wall_after_recover.on_login}"
      action: Helium.WaitUntil
      ignore_errors: true
      register: sat_wait_login_after_recover
      params:
        port: "${DEBUG_PORT}"
        timeout_secs: 300
        interval_ms: 900
        expression: |
          (() => {
            const u = String(location.href || "");
            const t = String(document.title || "");
            const b = String((document.body && document.body.innerText) || "").toLowerCase();
            const onLogin =
              /loginda\.siat\.sat\.gob\.mx|\/nidp\/wsfed\//i.test(u) ||
              /sat autenticaci[oÃ³]n|acceso por contrase[nÃ±]a|captcha/i.test((t + " " + b).toLowerCase());
            if (onLogin) return false;
            return /pstcdypisr\.clouda\.sat\.gob\.mx\/Declaracion\//i.test(u);
          })()

    - name: Re-check SAT login wall after recovery checkpoint
      action: CDP.EvaluateJson
      register: sat_login_wall_after_recover_checkpoint
      params:
        port: "${DEBUG_PORT}"
        expression: |
          (() => {
            const url = String(location.href || "");
            const title = String(document.title || "");
            const body = String((document.body && document.body.innerText) || "").toLowerCase();
            const onLogin =
              /loginda\.siat\.sat\.gob\.mx|\/nidp\/wsfed\//i.test(url) ||
              /sat autenticaci[oÃ³]n|acceso por contrase[nÃ±]a|captcha/i.test((title + " " + body).toLowerCase());
            return { ok: true, on_login: onLogin, url, title };
          })()

    - name: Fail if SAT session is still not authenticated after recovery
      if: "${sat_login_wall_after_recover_checkpoint.on_login}"
      action: Fail
      params:
        message: "SAT session moved out of Declaracion context and remains on login/authentication wall."

    - name: Open pending declaration row for target month
      action: CDP.EvaluateJson
      register: sat_open_pending_row
      params:
        port: "${DEBUG_PORT}"
        expression: |
          (() => {
            const year = "2025";
            const period = "001";
            const selector = ".btnVerDeclaracion[data-ejercicio='" + year + "'][data-periodo='" + period + "']";
            const el = document.querySelector(selector);
            if (!el) {
              const rows = Array.from(document.querySelectorAll(".btnVerDeclaracion"))
                .map((r) => ({
                  text: String((r.innerText || r.textContent || "").replace(/\s+/g, " ").trim()),
                  year: String(r.getAttribute("data-ejercicio") || ""),
                  period: String(r.getAttribute("data-periodo") || "")
                }))
                .slice(0, 30);
              return { ok: true, found: false, selector, rows };
            }
            try {
              el.click();
              return {
                ok: true,
                found: true,
                clicked: true,
                selector,
                text: String((el.innerText || el.textContent || "").replace(/\s+/g, " ").trim()),
                attrs: {
                  year: String(el.getAttribute("data-ejercicio") || ""),
                  period: String(el.getAttribute("data-periodo") || ""),
                  obligations: String(el.getAttribute("data-obligaciones") || "")
                }
              };
            } catch (e) {
              return { ok: true, found: true, clicked: false, selector, error: String((e && e.message) || e || "click_failed") };
            }
          })()

    - name: Persist pending-row open result
      action: FS.WriteJson
      params:
        path: "${OUTPUT_DIR}\\sat\\declarations\\${SAT_TARGET_YEAR}\\${SAT_TARGET_MONTH}.pending_open.json"
        overwrite: true
        value: "${sat_open_pending_row}"

    - name: Set visual label (v02_pending_row)
      if: "${SAT_VISUAL_CHECKPOINTS}"
      action: Set
      params:
        name: SAT_VISUAL_LABEL
        value: "v02_pending_row"

    - name: Visual checkpoint v02_pending_row
      if: "${SAT_VISUAL_CHECKPOINTS}"
      playbook: "${PLAYBOOK_DIR}\\playbook_visual_checkpoint.yml"

    - name: Fail when pending row was not found
      if_not: "${sat_open_pending_row.found}"
      action: Fail
      params:
        message: "Pending declaration row for ${SAT_TARGET_YEAR}-${SAT_TARGET_MONTH} was not found in Temporales."

    - name: Wait for Formulario route after pending click
      ignore_errors: true
      action: Helium.WaitUntilUrl
      params:
        port: "${DEBUG_PORT}"
        timeout_secs: 40
        url_regex: "Formulario"

    - name: Verify we are on Formulario page
      action: CDP.EvaluateJson
      register: sat_form_nav_check
      params:
        port: "${DEBUG_PORT}"
        expression: "(() => ({ url: location.href || '', on_formulario: /Declaracion\\/Formulario|\\/Formulario\\/Formulario/i.test(location.href || '') }))()"

    - name: Recover Formulario route from checkpoint URL
      if_not: "${sat_form_nav_check.on_formulario}"
      action: CDP.Navigate
      ignore_errors: true
      params:
        port: "${DEBUG_PORT}"
        url: "${sat_visual_state.url}"
        wait_ms: 2600
        wait_until: "interactive"

    - name: Wait for Formulario route after recovery
      if_not: "${sat_form_nav_check.on_formulario}"
      ignore_errors: true
      action: Helium.WaitUntilUrl
      params:
        port: "${DEBUG_PORT}"
        timeout_secs: 20
        url_regex: "Formulario"

    - name: Re-verify Formulario route after recovery
      if_not: "${sat_form_nav_check.on_formulario}"
      action: CDP.EvaluateJson
      register: sat_form_nav_check
      params:
        port: "${DEBUG_PORT}"
        expression: "(() => ({ url: location.href || '', on_formulario: /Declaracion\\/Formulario|\\/Formulario\\/Formulario/i.test(location.href || '') }))()"

    - name: Set visual label (v03_formulario_route)
      if: "${SAT_VISUAL_CHECKPOINTS}"
      action: Set
      params:
        name: SAT_VISUAL_LABEL
        value: "v03_formulario_route"

    - name: Visual checkpoint v03_formulario_route
      if: "${SAT_VISUAL_CHECKPOINTS}"
      playbook: "${PLAYBOOK_DIR}\\playbook_visual_checkpoint.yml"

    - name: Fail if Formulario route was not reached
      if_not: "${sat_form_nav_check.on_formulario}"
      action: Fail
      params:
        message: "Pending row click did not reach Formulario route."

    - name: Load SAT form probe JS
      action: FS.ReadText
      register: js_sat_form_probe
      params:
        path: "${SKILL_SAT_TAX_ASSETS_DIR}\\sat_form_probe.js"

    - name: Probe SAT form state
      action: CDP.EvaluateJson
      register: sat_form_probe
      params:
        port: "${DEBUG_PORT}"
        expression: "${js_sat_form_probe}"

    - name: Persist form probe
      action: FS.WriteJson
      params:
        path: "${OUTPUT_DIR}\\sat\\declarations\\${SAT_TARGET_YEAR}\\${SAT_TARGET_MONTH}.form_probe.json"
        overwrite: true
        value: "${sat_form_probe}"

    - name: Set visual label (v04_form_probe)
      if: "${SAT_VISUAL_CHECKPOINTS}"
      action: Set
      params:
        name: SAT_VISUAL_LABEL
        value: "v04_form_probe"

    - name: Visual checkpoint v04_form_probe
      if: "${SAT_VISUAL_CHECKPOINTS}"
      playbook: "${PLAYBOOK_DIR}\\playbook_visual_checkpoint.yml"

    - name: Try mark "Sin operaciones" (best effort)
      ignore_errors: true
      action: Helium.ClickAny
      register: sat_click_sin_operaciones
      params:
        port: "${DEBUG_PORT}"
        text_candidates: "Sin operaciones|Sin Operaciones|DeclaraciÃƒÂ³n sin operaciones|Declaracion sin operaciones|Sin actividad|Sin Actividad"
        implicit_wait_ms: 1800
        find_in_page_fallback: true

    - name: Load SAT fill-zero amounts JS
      action: FS.ReadText
      register: js_sat_fill_zero_amounts
      params:
        path: "${SKILL_SAT_TAX_ASSETS_DIR}\\sat_fill_zero_amounts.js"

    - name: Fill empty amount fields with 0 (best effort)
      action: CDP.EvaluateJson
      register: sat_zero_fill
      params:
        port: "${DEBUG_PORT}"
        expression: "${js_sat_fill_zero_amounts}"

    - name: Persist zero-fill result
      action: FS.WriteJson
      params:
        path: "${OUTPUT_DIR}\\sat\\declarations\\${SAT_TARGET_YEAR}\\${SAT_TARGET_MONTH}.zero_fill.json"
        overwrite: true
        value: "${sat_zero_fill}"

    - name: Set visual label (v05_zero_fill)
      if: "${SAT_VISUAL_CHECKPOINTS}"
      action: Set
      params:
        name: SAT_VISUAL_LABEL
        value: "v05_zero_fill"

    - name: Visual checkpoint v05_zero_fill
      if: "${SAT_VISUAL_CHECKPOINTS}"
      playbook: "${PLAYBOOK_DIR}\\playbook_visual_checkpoint.yml"

    - name: Load SAT deep discovery JS
      action: FS.ReadText
      register: js_sat_deep_form_discovery
      params:
        path: "${SKILL_SAT_TAX_ASSETS_DIR}\\sat_deep_form_discovery.js"

    - name: Set deep mode close_prellenado
      action: Set
      params:
        name: SAT_DEEP_MODE
        value: "close_prellenado"

    - name: Close prellenado before concept sweep
      ignore_errors: true
      action: CDP.EvaluateJson
      register: sat_close_prellenado_pre_sweep
      params:
        port: "${DEBUG_PORT}"
        expression: "${js_sat_deep_form_discovery}"

    - name: Wait after prellenado close before concept sweep
      if: "${sat_close_prellenado_pre_sweep.clicked}"
      action: CDP.Wait
      params:
        ms: 900

    - name: Set deep mode detect_concepts (initial)
      action: Set
      params:
        name: SAT_DEEP_MODE
        value: "detect_concepts"

    - name: Detect concept links before deep sweep
      action: CDP.EvaluateJson
      register: sat_concepts_catalog_initial
      params:
        port: "${DEBUG_PORT}"
        expression: "${js_sat_deep_form_discovery}"

    - name: Set deep mode open_admin
      if_not: "${sat_concepts_catalog_initial.has_any_concepts}"
      action: Set
      params:
        name: SAT_DEEP_MODE
        value: "open_admin"

    - name: Open administracion menu for deep sweep
      if_not: "${sat_concepts_catalog_initial.has_any_concepts}"
      ignore_errors: true
      action: CDP.EvaluateJson
      register: sat_open_admin_for_sweep
      params:
        port: "${DEBUG_PORT}"
        expression: "${js_sat_deep_form_discovery}"

    - name: Wait after opening administracion menu
      if_not: "${sat_concepts_catalog_initial.has_any_concepts}"
      action: CDP.Wait
      params:
        ms: 1100

    - name: Set deep mode detect_concepts (final)
      action: Set
      params:
        name: SAT_DEEP_MODE
        value: "detect_concepts"

    - name: Detect concept links for deep sweep
      action: CDP.EvaluateJson
      register: sat_concepts_catalog
      params:
        port: "${DEBUG_PORT}"
        expression: "${js_sat_deep_form_discovery}"

    - name: Persist deep concept catalog
      action: FS.WriteJson
      params:
        path: "${OUTPUT_DIR}\\sat\\declarations\\${SAT_TARGET_YEAR}\\${SAT_TARGET_MONTH}.deep_concepts_catalog.json"
        overwrite: true
        value:
          initial: "${sat_concepts_catalog_initial}"
          open_admin: "${sat_open_admin_for_sweep}"
          final: "${sat_concepts_catalog}"

    - name: Fail when concept menu is not visible
      if_not: "${sat_concepts_catalog.has_any_concepts}"
      action: Fail
      params:
        message: "Deep discovery could not find declaration concept links."

    - name: Set deep target ISR salarios
      if: "${sat_concepts_catalog.has_isr_salarios}"
      action: Set
      params:
        name: SAT_DEEP_TARGET
        value: "isr retenciones por salarios"

    - name: Set deep mode open_admin (ISR salarios)
      if: "${sat_concepts_catalog.has_isr_salarios}"
      action: Set
      params:
        name: SAT_DEEP_MODE
        value: "open_admin"

    - name: Open administracion before ISR salarios
      if: "${sat_concepts_catalog.has_isr_salarios}"
      ignore_errors: true
      action: CDP.EvaluateJson
