        path: "${OUTPUT_DIR}\\sat\\declarations\\${SAT_TARGET_YEAR}\\${SAT_TARGET_MONTH}.submit_click.json"
        overwrite: true
        value: "${sat_click_submit}"

    - name: Wait before inspecting submit modal
      if: "${SAT_DO_SUBMIT}"
      action: CDP.Wait
      params:
        ms: 1100

    - name: Set deep mode probe_submit_modal
      if: "${SAT_DO_SUBMIT}"
      action: Set
      params:
        name: SAT_DEEP_MODE
        value: "probe_submit_modal"

    - name: Inspect submit modal state (prellenado/confirm)
      if: "${SAT_DO_SUBMIT}"
      action: CDP.EvaluateJson
      register: sat_submit_modal_probe
      params:
        port: "${DEBUG_PORT}"
        expression: "${js_sat_deep_form_discovery}"

    - name: Wait for loading modal to settle
      if: "${sat_submit_modal_probe.has_loading}"
      if_not: "${sat_submit_modal_probe.has_confirm_button}"
      action: CDP.Wait
      params:
        ms: 2200

    - name: Re-inspect submit modal after loading settle
      if: "${sat_submit_modal_probe.has_loading}"
      if_not: "${sat_submit_modal_probe.has_confirm_button}"
      action: CDP.EvaluateJson
      register: sat_submit_modal_probe
      params:
        port: "${DEBUG_PORT}"
        expression: "${js_sat_deep_form_discovery}"

    - name: Persist submit modal state
      if: "${SAT_DO_SUBMIT}"
      action: FS.WriteJson
      params:
        path: "${OUTPUT_DIR}\\sat\\declarations\\${SAT_TARGET_YEAR}\\${SAT_TARGET_MONTH}.submit_modal_probe.json"
        overwrite: true
        value: "${sat_submit_modal_probe}"

    - name: Close prellenado modal via DOM click
      if: "${sat_submit_modal_probe.has_prellenado}"
      action: CDP.EvaluateJson
      register: sat_close_prellenado_dom
      ignore_errors: true
      params:
        port: "${DEBUG_PORT}"
        expression: |
          (() => {
            const norm = (v) => String(v == null ? "" : v).replace(/\s+/g, " ").trim();
            const vis = (e) => {
              if (!e) return false;
              const r = e.getBoundingClientRect();
              const s = getComputedStyle(e);
              return r.width > 0 && r.height > 0 && s.display !== "none" && s.visibility !== "hidden" && s.opacity !== "0";
            };
            const dialogs = Array.from(document.querySelectorAll(".modal.show,.bootbox.modal,[role='dialog']")).filter((d) => vis(d));
            const pre = dialogs.find((d) => /prellenado/i.test(norm(d.innerText || d.textContent || ""))) || dialogs[0];
            if (!pre) return { ok: true, clicked: false, reason: "dialog_not_found" };
            const btn = Array.from(pre.querySelectorAll("button,a,input[type=button],input[type=submit]"))
              .find((b) => /cerrar/i.test(norm(b.innerText || b.textContent || b.value || "")));
            if (!btn) return { ok: true, clicked: false, reason: "close_button_not_found" };
            try {
              btn.click();
              return { ok: true, clicked: true, button_text: norm(btn.innerText || btn.textContent || btn.value || "") };
            } catch (e) {
              return { ok: true, clicked: false, reason: "click_failed", error: String((e && e.message) || e || "click_failed") };
            }
          })()

    - name: Close prellenado modal via selector fallback
      if: "${sat_submit_modal_probe.has_prellenado}"
      if_not: "${sat_close_prellenado_dom.clicked}"
      action: Helium.ClickAny
      register: sat_close_prellenado_fallback
      ignore_errors: true
      params:
        port: "${DEBUG_PORT}"
        candidates:
          - kind: "s"
            selector: ".modal.show .bootbox-accept"
          - kind: "s"
            selector: ".modal.show .btn-primary"
        text_candidates: "CERRAR|Cerrar|Aceptar|OK|Ok"
        implicit_wait_ms: 2200
        find_in_page_fallback: false

    - name: Wait after prellenado close
      if: "${sat_submit_modal_probe.has_prellenado}"
      action: CDP.Wait
      params:
        ms: 1100

    - name: Visit concept ISR retenciones por salarios (validation recovery)
      if: "${sat_submit_modal_probe.has_validation_error}"
      ignore_errors: true
      action: Helium.ClickAny
      register: sat_visit_concept_isr_salarios
      params:
        port: "${DEBUG_PORT}"
        text_candidates: "ISR retenciones por salarios"
        implicit_wait_ms: 1800
        find_in_page_fallback: true

    - name: Wait after concept ISR salarios
      if: "${sat_submit_modal_probe.has_validation_error}"
      action: CDP.Wait
      params:
        ms: 700

    - name: Visit concept ISR retenciones asimilados (validation recovery)
      if: "${sat_submit_modal_probe.has_validation_error}"
      ignore_errors: true
      action: Helium.ClickAny
      register: sat_visit_concept_isr_asimilados
      params:
        port: "${DEBUG_PORT}"
        text_candidates: "ISR retenciones por asimilados a salarios"
        implicit_wait_ms: 1800
        find_in_page_fallback: true

    - name: Wait after concept ISR asimilados
      if: "${sat_submit_modal_probe.has_validation_error}"
      action: CDP.Wait
      params:
        ms: 700

    - name: Visit concept IVA retenciones (validation recovery)
      if: "${sat_submit_modal_probe.has_validation_error}"
      ignore_errors: true
      action: Helium.ClickAny
      register: sat_visit_concept_iva_retenciones
      params:
        port: "${DEBUG_PORT}"
        text_candidates: "IVA retenciones"
        implicit_wait_ms: 1800
        find_in_page_fallback: true

    - name: Wait after concept IVA retenciones
      if: "${sat_submit_modal_probe.has_validation_error}"
      action: CDP.Wait
      params:
        ms: 900

    - name: Re-run zero-fill after concept visits
      if: "${sat_submit_modal_probe.has_validation_error}"
      action: CDP.EvaluateJson
      register: sat_zero_fill_after_validation
      params:
        port: "${DEBUG_PORT}"
        expression: "${js_sat_fill_zero_amounts}"

    - name: Persist validation-recovery actions
      if: "${sat_submit_modal_probe.has_validation_error}"
      action: FS.WriteJson
      params:
        path: "${OUTPUT_DIR}\\sat\\declarations\\${SAT_TARGET_YEAR}\\${SAT_TARGET_MONTH}.validation_recovery.json"
        overwrite: true
        value:
          probe: "${sat_submit_modal_probe}"
          visit_isr_salarios: "${sat_visit_concept_isr_salarios}"
          visit_isr_asimilados: "${sat_visit_concept_isr_asimilados}"
          visit_iva_retenciones: "${sat_visit_concept_iva_retenciones}"
          zero_fill_after_validation: "${sat_zero_fill_after_validation}"

    - name: Set visual label (v06b_concepts_visited)
      if: "${sat_submit_modal_probe.has_validation_error}"
      action: Set
      params:
        name: SAT_VISUAL_LABEL
        value: "v06b_concepts_visited"

    - name: Visual checkpoint v06b_concepts_visited
      if: "${sat_submit_modal_probe.has_validation_error}"
      playbook: "${PLAYBOOK_DIR}\\playbook_visual_checkpoint.yml"

    - name: Set deep mode click_submit_button (after prellenado)
      if: "${sat_submit_modal_probe.has_prellenado}"
      action: Set
      params:
        name: SAT_DEEP_MODE
        value: "click_submit_button"

    - name: Re-click Enviar declaracion after prellenado close
      if: "${sat_submit_modal_probe.has_prellenado}"
      action: CDP.EvaluateJson
      register: sat_click_submit_after_prellenado
      ignore_errors: true
      params:
        port: "${DEBUG_PORT}"
        expression: "${js_sat_deep_form_discovery}"

    - name: Wait after submit re-click post-prellenado
      if: "${sat_click_submit_after_prellenado.clicked}"
      action: CDP.Wait
      params:
        ms: 1400

    - name: Set deep mode probe_submit_modal (post-prellenado)
      if: "${sat_click_submit_after_prellenado.clicked}"
      action: Set
      params:
        name: SAT_DEEP_MODE
        value: "probe_submit_modal"

    - name: Re-inspect submit modal after prellenado handling
      if: "${sat_click_submit_after_prellenado.clicked}"
      action: CDP.EvaluateJson
      register: sat_submit_modal_probe
      params:
        port: "${DEBUG_PORT}"
        expression: "${js_sat_deep_form_discovery}"

    - name: Set deep mode click_modal_confirm
      if: "${SAT_DO_SUBMIT}"
      action: Set
      params:
        name: SAT_DEEP_MODE
        value: "click_modal_confirm"

    - name: Click confirmation modal via strict DOM button match
      if: "${SAT_DO_SUBMIT}"
      action: CDP.EvaluateJson
      register: sat_click_confirm_dom
      ignore_errors: true
      params:
        port: "${DEBUG_PORT}"
        expression: "${js_sat_deep_form_discovery}"

    - name: Click confirmation modal selector fallback
      if: "${sat_submit_modal_probe.has_confirm_button}"
      if_not: "${sat_click_confirm_dom.clicked}"
      action: Helium.ClickAny
      register: sat_click_confirm_fallback
      ignore_errors: true
      params:
        port: "${DEBUG_PORT}"
        candidates:
          - kind: "s"
            selector: ".modal.show .bootbox-accept"
          - kind: "s"
            selector: ".modal.show .btn-primary"
        text_candidates: "Aceptar|Si|SÃƒÂ­|Confirmar|Continuar"
        implicit_wait_ms: 2200
        find_in_page_fallback: false

    - name: Persist confirmation click result
      if: "${SAT_DO_SUBMIT}"
      action: FS.WriteJson
      params:
        path: "${OUTPUT_DIR}\\sat\\declarations\\${SAT_TARGET_YEAR}\\${SAT_TARGET_MONTH}.confirm_click.json"
        overwrite: true
        value:
          modal_probe: "${sat_submit_modal_probe}"
          close_prellenado_dom: "${sat_close_prellenado_dom}"
          close_prellenado_fallback: "${sat_close_prellenado_fallback}"
          submit_after_prellenado: "${sat_click_submit_after_prellenado}"
          confirm_dom: "${sat_click_confirm_dom}"
          confirm_fallback: "${sat_click_confirm_fallback}"

    - name: Set deep mode probe_validation (post-submit)
      if: "${SAT_DO_SUBMIT}"
      action: Set
      params:
        name: SAT_DEEP_MODE
        value: "probe_validation"

    - name: Probe validation blockers after submit modal handling
      if: "${SAT_DO_SUBMIT}"
      action: CDP.EvaluateJson
      register: sat_validation_after_submit
      params:
        port: "${DEBUG_PORT}"
        expression: "${js_sat_deep_form_discovery}"

    - name: Persist post-submit validation probe
      if: "${SAT_DO_SUBMIT}"
      action: FS.WriteJson
      params:
        path: "${OUTPUT_DIR}\\sat\\declarations\\${SAT_TARGET_YEAR}\\${SAT_TARGET_MONTH}.post_submit_validation.json"
        overwrite: true
        value: "${sat_validation_after_submit}"

    - name: Fail when validation blocker remains after submit handling
      if: "${sat_validation_after_submit.has_validation_blocker}"
      action: Fail
      params:
        message: "SAT still shows validation blockers after submit handling; acuse route is not valid yet."

    - name: Set visual label (v07_submit_confirm)
      if: "${SAT_DO_SUBMIT}"
      action: Set
      params:
        name: SAT_VISUAL_LABEL
        value: "v07_submit_confirm"

    - name: Visual checkpoint v07_submit_confirm
      if: "${SAT_DO_SUBMIT}"
      playbook: "${PLAYBOOK_DIR}\\playbook_visual_checkpoint.yml"

    - name: Wait after submit confirmation
      if: "${SAT_DO_SUBMIT}"
      action: CDP.Wait
      params:
        ms: 1300

    - name: Probe route right after submit confirmation
      if: "${SAT_DO_SUBMIT}"
      action: CDP.EvaluateJson
      register: sat_acuse_route_after_confirm
      params:
        port: "${DEBUG_PORT}"
        expression: |
          (() => {
            const u = location.href || "";
            const title = document.title || "";
            const body = String((document.body && document.body.innerText) || "").toLowerCase();
            const txt = (String(title || "") + " " + body).toLowerCase();
            const has404 =
              txt.includes("resource cannot be found") ||
              txt.includes("server error in '/' application") ||
              txt.includes("http 404") ||
              txt.includes("no se encuentra");
            return {
              url: u,
              title,
              on_acuse: /acuse|recep|pdf\/acuse/i.test(u),
              has_404: has404
            };
          })()

    - name: Set deep mode click_visible_acuse_link
      if: "${SAT_DO_SUBMIT}"
      action: Set
      params:
        name: SAT_DEEP_MODE
        value: "click_visible_acuse_link"

    - name: Click explicit visible acuse confirmation link (best effort)
      if: "${SAT_DO_SUBMIT}"
      if_not: "${sat_acuse_route_after_confirm.on_acuse}"
      action: CDP.EvaluateJson
      register: sat_click_yes_acuse
      params:
        port: "${DEBUG_PORT}"
        expression: "${js_sat_deep_form_discovery}"

    - name: Persist explicit "Si" click result
      if: "${SAT_DO_SUBMIT}"
      action: FS.WriteJson
      params:
        path: "${OUTPUT_DIR}\\sat\\declarations\\${SAT_TARGET_YEAR}\\${SAT_TARGET_MONTH}.yes_click.json"
        overwrite: true
        value: "${sat_click_yes_acuse}"

    - name: Capture acuse link candidate
      if: "${SAT_DO_SUBMIT}"
      if_not: "${sat_acuse_route_after_confirm.on_acuse}"
      action: CDP.EvaluateJson
      register: sat_acuse_link
      params:
        port: "${DEBUG_PORT}"
        expression: |
          (() => {
            const vis = (e) => {
              if (!e) return false;
              const r = e.getBoundingClientRect();
              const s = getComputedStyle(e);
              return r.width > 0 && r.height > 0 && s.display !== "none" && s.visibility !== "hidden" && s.opacity !== "0";
            };
            const links = Array.from(document.querySelectorAll("a[href*='acuse.pdf'],a[href*='pdf/acuse']")).map((a) => ({
              href: String(a.href || ""),
              text: String((a.innerText || a.textContent || "").trim()),
              visible: vis(a)
            }));
            const visible = links.filter((l) => l.visible);
            const visibleHref = visible.length ? String(visible[0].href || "") : "";
            return {
              ok: true,
              visible_href: visibleHref,
              visible_links_count: visible.length,
              links_count: links.length,
              sample: visible.slice(0, 6),
              current_url: location.href || ""
            };
          })()

    - name: Open acuse link candidate when available
      if: "${sat_acuse_link.visible_href}"
      if_not: "${sat_acuse_route_after_confirm.on_acuse}"
      action: CDP.Navigate
      ignore_errors: true
      params:
        port: "${DEBUG_PORT}"
        url: "${sat_acuse_link.visible_href}"
        wait_ms: 3200
        wait_until: "interactive"

    - name: Wait for acuse/confirmation page (best effort)
      if: "${SAT_DO_SUBMIT}"
      ignore_errors: true
      action: Helium.WaitUntilUrl
      params:
        port: "${DEBUG_PORT}"
        timeout_secs: 12
        url_regex: "acuse|Acuse|confirm|Confirm|Recep|pdf/acuse|acuse\\.pdf"

    - name: Verify acuse page quality
      if: "${SAT_DO_SUBMIT}"
      action: CDP.EvaluateJson
      register: sat_acuse_route
      params:
        port: "${DEBUG_PORT}"
        expression: |
          (() => {
            const u = location.href || "";
            const title = document.title || "";
            const body = String((document.body && document.body.innerText) || "").toLowerCase();
            const txt = (String(title || "") + " " + body).toLowerCase();
            const has404 =
              txt.includes("resource cannot be found") ||
              txt.includes("server error in '/' application") ||
              txt.includes("http 404") ||
              txt.includes("no se encuentra");
            return {
              url: u,
              title,
              on_acuse: /acuse|recep|pdf\/acuse/i.test(u),
              has_404: has404
            };
          })()

    - name: Set visual label (v08_acuse_route)
      if: "${SAT_DO_SUBMIT}"
      action: Set
      params:
        name: SAT_VISUAL_LABEL
        value: "v08_acuse_route"

    - name: Visual checkpoint v08_acuse_route
      if: "${SAT_DO_SUBMIT}"
      playbook: "${PLAYBOOK_DIR}\\playbook_visual_checkpoint.yml"

    - name: Fail when acuse route is unresolved or invalid
      if: "${SAT_DO_SUBMIT}"
      if_not: "${sat_acuse_route.on_acuse}"
      action: Fail
      params:
        message: "Submit clicked but acuse route was not reached."

    - name: Fail when acuse page is 404
      if: "${sat_acuse_route.has_404}"
      action: Fail
      params:
        message: "Acuse link opened a 404/error page. Submission is not valid."

    - name: Trigger download button/link on acuse page (best effort)
      if: "${SAT_DO_SUBMIT}"
      action: CDP.EvaluateJson
      register: sat_click_download
      params:
        port: "${DEBUG_PORT}"
        expression: |
          (() => {
            const pick = () => (
              document.querySelector("a[download]") ||
              document.querySelector("a[href*='acuse.pdf']") ||
              document.querySelector("#download") ||
              document.querySelector("#downloadButton") ||
              Array.from(document.querySelectorAll("a,button")).find((el) => /descarg|download|guardar|bajar/i.test((el.innerText || el.textContent || "").trim()))
            );
            const el = pick();
            if (!el) return { ok: true, clicked: false, reason: "download_control_not_found", url: location.href || "" };
            try {
              el.click();
              return { ok: true, clicked: true, tag: String((el.tagName || "").toLowerCase()), id: String(el.id || ""), href: String(el.href || ""), text: String((el.innerText || el.textContent || "").trim()), url: location.href || "" };
            } catch (e) {
              return { ok: true, clicked: false, reason: "download_click_failed", error: String((e && e.message) || e || "download_click_failed"), url: location.href || "" };
            }
          })()

    - name: Capture viewport point for PDF toolbar download
      if: "${SAT_DO_SUBMIT}"
      if_not: "${sat_click_download.clicked}"
      action: CDP.EvaluateJson
      register: sat_pdf_toolbar_point
      params:
        port: "${DEBUG_PORT}"
        expression: "(() => ({ x: Math.max(20, (window.innerWidth || 1200) - 42), y: 52 }))()"

    - name: Click PDF toolbar download icon (native fallback)
      if: "${SAT_DO_SUBMIT}"
      if_not: "${sat_click_download.clicked}"
      ignore_errors: true
      action: Helium.ClickNative
      register: sat_click_download_native
      params:
        port: "${DEBUG_PORT}"
        element:
          kind: "point"
          x: "${sat_pdf_toolbar_point.x}"
          y: "${sat_pdf_toolbar_point.y}"

    - name: Persist download click result
      if: "${SAT_DO_SUBMIT}"
      action: FS.WriteJson
      params:
        path: "${OUTPUT_DIR}\\sat\\declarations\\${SAT_TARGET_YEAR}\\${SAT_TARGET_MONTH}.download_click.json"
        overwrite: true
        value:
          dom_click: "${sat_click_download}"
          native_click: "${sat_click_download_native}"
          toolbar_point: "${sat_pdf_toolbar_point}"

    - name: Set visual label (v09_download_clicked)
      if: "${SAT_DO_SUBMIT}"
      action: Set
      params:
        name: SAT_VISUAL_LABEL
        value: "v09_download_clicked"

    - name: Visual checkpoint v09_download_clicked
      if: "${SAT_DO_SUBMIT}"
      playbook: "${PLAYBOOK_DIR}\\playbook_visual_checkpoint.yml"

    - name: Print acuse to PDF (CDP)
      if: "${SAT_DO_SUBMIT}"
      action: CDP.Send
      register: sat_acuse_pdf
      params:
        port: "${DEBUG_PORT}"
        method: "Page.printToPDF"

    - name: Save acuse PDF to file
      if: "${SAT_DO_SUBMIT}"
      action: FS.WriteBase64
      params:
        path: "${OUTPUT_DIR}\\sat\\declarations\\${SAT_TARGET_YEAR}\\acuse\\${SAT_TARGET_YEAR}_${SAT_TARGET_MONTH}.acuse.pdf"
        overwrite: true
        base64: "${sat_acuse_pdf.result.data}"

    - name: Set visual label (v10_success)
      if: "${SAT_DO_SUBMIT}"
      action: Set
      params:
        name: SAT_VISUAL_LABEL
        value: "v10_success"

    - name: Visual checkpoint v10_success
      if: "${SAT_DO_SUBMIT}"
      playbook: "${PLAYBOOK_DIR}\\playbook_visual_checkpoint.yml"

    - name: Persist resume result
      action: FS.WriteJson
      params:
        path: "${OUTPUT_DIR}\\sat\\declarations\\${SAT_TARGET_YEAR}\\${SAT_TARGET_MONTH}.resume_result.json"
        overwrite: true
        value:
          ok: true
          target:
            year: "${SAT_TARGET_YEAR}"
            month: "${SAT_TARGET_MONTH}"
          pending_open: "${sat_open_pending_row}"
          on_formulario: "${sat_form_nav_check.on_formulario}"
          form_probe: "${sat_form_probe}"
          zero_fill: "${sat_zero_fill}"
          preview_click: "${sat_click_preview}"
          submit_click: "${sat_click_submit}"
          confirm_click:
            dom: "${sat_click_confirm_dom}"
            fallback: "${sat_click_confirm_fallback}"
          yes_click: "${sat_click_yes_acuse}"
          acuse_link: "${sat_acuse_link}"
          acuse_route: "${sat_acuse_route}"
          download_click:
            dom: "${sat_click_download}"
            native: "${sat_click_download_native}"
