metadata:
  category: "automation"
  subcategory: "framework-parity"
  customer: "Yo"
  course: "openclaw-benchmark"
  lesson: "waiba-parity-program"

variables:
  PROJECT_NAME: "waibaOpenclawParity"
  PROJECT_SKILL_PATH: "Automation.WaibaOpenclawParity"
  PROJECT_DIR: "${ROOT_PLAYBOOK_DIR}"
  PLAYBOOKS_DIR: "${PROJECT_DIR}\\playbooks"
  OUTPUT_DIR: "${PLAYBOOKS_DIR}\\output"
  JS_DIR: "${PLAYBOOKS_DIR}\\js"
  PROJECT_SKILLS_FILE: "${PROJECT_DIR}\\skills.yml"
  AUTONOMY_DOC: "${PROJECT_DIR}\\AUTONOMY.md"
  ARCHITECT_PROFILE_DOC: "${PROJECT_DIR}\\ARCHITECT_PROFILE.md"
  TASK_NAME: "WAIBA >= OpenClaw parity program"
  TASK_SUMMARY: "Build and execute a measurable roadmap to achieve capability parity and targeted superiority over OpenClaw."
  PARITY_TARGET: "openclaw"
  CURRENT_BASELINE: "waiba-v3"
  MAX_UNITS: 1
  # Set true to execute a real API call with LLM.Chat
  RUN_LIVE_LLM_TEST: false

steps:
  prod:
    - name: Bootstrap docs and governance
      playbook: "./playbooks/01_bootstrap/01_docs/playbook.yml"

    - name: Bootstrap runtime folders
      playbook: "./playbooks/01_bootstrap/02_runtime/playbook.yml"

    - name: Execute parity program
      playbook: "./playbooks/02_task/01_execute/playbook.yml"

    - name: Mark completion checkpoint
      playbook: "./playbooks/03_finalize/01_complete/playbook.yml"

  debug:
    - action: Note
      params:
        text: "Parity program debug mode for ${PROJECT_NAME}"
