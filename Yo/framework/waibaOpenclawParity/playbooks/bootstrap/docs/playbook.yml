steps:
  - name: Ensure project docs exist
    action: Framework.EnsureProjectDocs
    params:
      project_dir: "${PROJECT_DIR}"
      project_name: "${PROJECT_NAME}"
      category: "automation"
      subcategory: "framework-parity"
      customer: "Yo"
      course: "openclaw-benchmark"
      lesson: "waiba-parity-program"
      task_name: "${TASK_NAME}"
      task_summary: "${TASK_SUMMARY}"
      max_units: "${MAX_UNITS}"

  - name: Track parity baseline creation
    action: Framework.TrackGrowth
    params:
      project_dir: "${PROJECT_DIR}"
      category: "automation"
      note: "Parity program initialized with modular baseline/roadmap/implementation flow"
