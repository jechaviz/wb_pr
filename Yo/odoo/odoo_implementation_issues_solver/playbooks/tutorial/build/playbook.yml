steps:
  - name: Initialize tutorial workspace
    action: Tutorial.InitWorkspace
    register: tutorial_workspace
    params:
      project_dir: "${PROJECT_DIR}"

  - name: Load storyboard steps (JSON)
    action: FS.ReadText
    register: flow_steps_json
    params:
      path: "${PLAYBOOKS_DIR}\\tutorial\\flows\\rpr_rental_migrated_flow.json"

  - name: Build Odoo storyboard with timing
    action: Tutorial.BuildOdooStoryboard
    register: storyboard
    params:
      flow_name: "RP Rental migrated flow in Odoo"
      steps: "${flow_steps_json}"
      output_path: "${tutorial_workspace.timeline_dir}\\storyboard.odoo.json"

  - name: Generate multilingual subtitles
    action: Tutorial.GenerateSubtitles
    register: subtitle_bundle
    params:
      cues: "${storyboard.cues}"
      output_dir: "${tutorial_workspace.subtitles_dir}"
      mode: "switchable"
      primary_language: "es"
      languages:
        - "es"
        - "en"

  - name: Build stacked ASS (burn-in subtitles) in playbook
    action: Shell.RunJson
    register: stacked_ass_build
    params:
      command: 'node "${PLAYBOOKS_DIR}\\tutorial\\scripts\\build_stacked_ass.js" --storyboard "${storyboard.output_path}" --languages "es,en" --primary "es" --out "${tutorial_workspace.subtitles_dir}\\subtitles.stacked.ass"'
      unsafe: true

  - name: Generate mouse zoom keyframes
    action: Tutorial.GenerateMouseZoomKeyframes
    register: zoom_bundle
    params:
      output_path: "${tutorial_workspace.zoom_dir}\\mouse_zoom.keyframes.json"
      filter_hint_path: "${tutorial_workspace.zoom_dir}\\mouse_zoom.filter.txt"
      events:
        - start_ms: 0
          end_ms: 9000
          x: 0.48
          y: 0.38
          zoom: 1.20
        - start_ms: 9000
          end_ms: 18000
          x: 0.64
          y: 0.42
          zoom: 1.30
        - start_ms: 18000
          end_ms: 26000
          x: 0.56
          y: 0.60
          zoom: 1.25
        - start_ms: 26000
          end_ms: 34000
          x: 0.35
          y: 0.55
          zoom: 1.15
        - start_ms: 34000
          end_ms: 42000
          x: 0.58
          y: 0.47
          zoom: 1.22

  - name: Build render plan with music and subtitle modes
    action: Tutorial.BuildRenderPlan
    register: render_plan
    params:
      input_video: "${TUTORIAL_INPUT_VIDEO}"
      output_dir: "${tutorial_workspace.render_dir}"
      output_basename: "${TUTORIAL_OUTPUT_BASENAME}"
      subtitles:
        switchable: "${subtitle_bundle.switchable}"
        stacked_ass: "${stacked_ass_build.json.out_path}"
        timing_path: "${subtitle_bundle.timing_path}"
        output_dir: "${subtitle_bundle.output_dir}"
      subtitle_languages:
        - "es"
        - "en"
      bgm_path: "${TUTORIAL_BGM}"
      zoom_events_path: "${zoom_bundle.events_path}"
      manifest_path: "${tutorial_workspace.render_dir}\\render.plan.json"
      command_script_path: "${tutorial_workspace.render_dir}\\render.cmd"

  - name: Persist tutorial package summary
    action: FS.WriteJson
    params:
      path: "${OUTPUT_DIR}\\tutorial_package_summary.json"
      overwrite: true
      value:
        odoo_visit: "${odoo_visit}"
        storyboard: "${storyboard}"
        subtitles: "${subtitle_bundle}"
        stacked_ass: "${stacked_ass_build}"
        zoom: "${zoom_bundle}"
        render_plan: "${render_plan}"
