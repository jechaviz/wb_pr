steps:
  - name: Ensure project docs exist
    action: Framework.EnsureProjectDocs
    params:
      project_dir: "${PROJECT_DIR}"
      project_name: "${PROJECT_NAME}"
      category: "odoo"
      subcategory: "training"
      customer: "Yo"
      course: "rpr-rental"
      lesson: "manual-to-odoo-migration"
      task_name: "${TASK_NAME}"
      task_summary: "${TASK_SUMMARY}"
      course_url: "${COURSE_URL}"
      debug_port: "${DEBUG_PORT}"
      max_units: "${MAX_UNITS}"

  - name: Ensure autonomy doctrine docs exist
    action: Framework.EnsureAutonomyDoctrine
    params:
      project_dir: "${PROJECT_DIR}"
      project_name: "${PROJECT_NAME}"
      category: "odoo"
      subcategory: "training"
      customer: "Yo"
      task_name: "${TASK_NAME}"
      task_summary: "${TASK_SUMMARY}"

  - name: Track architecture upgrade
    action: Framework.TrackGrowth
    params:
      project_dir: "${PROJECT_DIR}"
      category: "odoo"
      note: "Upgraded tutorial pipeline to numbered WAIBA architecture with autonomy enforcement."
