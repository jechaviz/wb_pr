steps:
  - name: Mark task completed
    action: Framework.MarkTaskCompleted
    params:
      project_dir: "${PROJECT_DIR}"
      task_name: "${TASK_NAME}"
      summary: "${TASK_SUMMARY}"
      artifacts:
        - "${ROOT_PLAYBOOK_PATH}"
        - "${PROJECT_DIR}\\playbooks"
        - "${PROJECT_DIR}\\playbooks\\odoo\\connect\\playbook.yml"
        - "${PROJECT_DIR}\\playbooks\\tutorial\\build\\playbook.yml"
        - "${OUTPUT_DIR}"
        - "${PROJECT_DIR}\\playbooks\\tutorial\\subtitles"
        - "${PROJECT_DIR}\\playbooks\\tutorial\\timeline"
        - "${PROJECT_DIR}\\playbooks\\tutorial\\zoom"
        - "${PROJECT_DIR}\\playbooks\\tutorial\\render"
        - "${PROJECT_DIR}\\PRD.md"
        - "${PROJECT_DIR}\\SDD.md"
