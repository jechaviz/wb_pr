steps:
  - name: Ensure project docs exist
    action: Framework.EnsureProjectDocs
    params:
      project_dir: "${PROJECT_DIR}"
      project_name: "${PROJECT_NAME}"
      category: "cursos"
      subcategory: "udemy"
      customer: "Yo"
      course: "generic-udemy"
      lesson: "transcription-recovery"
      task_name: "${TASK_NAME}"
      task_summary: "${TASK_SUMMARY}"
      course_url: "${COURSE_URL}"
      debug_port: "${DEBUG_PORT}"
      max_units: "${MAX_UNITS}"

  - name: Ensure autonomy doctrine docs exist
    action: Framework.EnsureAutonomyDoctrine
    params:
      project_dir: "${PROJECT_DIR}"
      project_name: "${PROJECT_NAME}"
      category: "cursos"
      subcategory: "udemy"
      customer: "Yo"
      task_name: "${TASK_NAME}"
      task_summary: "${TASK_SUMMARY}"

  - name: Track architecture upgrade
    action: Framework.TrackGrowth
    params:
      project_dir: "${PROJECT_DIR}"
      category: "web"
      note: "Upgraded Udemy recovery to numbered WAIBA architecture with autonomy enforcement."
