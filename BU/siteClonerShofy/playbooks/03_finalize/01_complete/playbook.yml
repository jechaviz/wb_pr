steps:
  - name: Mark task completed
    action: Framework.MarkTaskCompleted
    params:
      project_dir: "${PROJECT_DIR}"
      task_name: "${TASK_NAME}"
      summary: "${TASK_SUMMARY}"
      artifacts:
        - "${ROOT_PLAYBOOK_PATH}"
        - "${PROJECT_DIR}\\playbooks"
        - "${OUTPUT_DIR}"
        - "${OUTPUT_DIR}\\readiness_report.json"
        - "${OUTPUT_DIR}\\cloning_policy.resolved.yml"
        - "${OUTPUT_DIR}\\responsive_preview_desktop.png"
        - "${OUTPUT_DIR}\\responsive_preview_tablet.png"
        - "${OUTPUT_DIR}\\responsive_preview_mobile.png"
        - "${OUTPUT_DIR}\\phase3_visible_functionality.json"
        - "${OUTPUT_DIR}\\phase4_design_upgrade.json"
        - "${OUTPUT_DIR}\\template_home.png"
        - "${OUTPUT_DIR}\\reference\\flow_product_list_from_search.png"
        - "${OUTPUT_DIR}\\reference\\flow_product_detail.png"
        - "${OUTPUT_DIR}\\reference\\flow_cart.png"
        - "${OUTPUT_DIR}\\reference\\flow_checkout.png"
        - "${OUTPUT_DIR}\\reference\\dashboard_user_dashboard.png"
        - "${OUTPUT_DIR}\\reference\\dashboard_vendor_dashboard.png"
        - "${OUTPUT_DIR}\\reference\\dashboard_admin_dashboard.png"
        - "${TEMPLATE_DIR}\\index.html"
        - "${TEMPLATE_DIR}\\src\\main.js"
        - "${TEMPLATE_DIR}\\src\\routes.js"
        - "${TEMPLATE_DIR}\\src\\pages\\cart.vue"
        - "${TEMPLATE_DIR}\\src\\pages\\wishlist.vue"
        - "${TEMPLATE_DIR}\\src\\pages\\compare.vue"
        - "${TEMPLATE_DIR}\\src\\pages\\checkout.vue"
        - "${PROJECT_DIR}\\PRD.md"
        - "${PROJECT_DIR}\\SDD.md"
