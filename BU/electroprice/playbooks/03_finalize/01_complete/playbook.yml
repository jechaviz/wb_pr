steps:
  - name: Mark task completed
    action: Framework.MarkTaskCompleted
    params:
      project_dir: "${PROJECT_DIR}"
      task_name: "${TASK_NAME}"
      summary: "${TASK_SUMMARY}"
      artifacts:
        - "${ROOT_PLAYBOOK_PATH}"
        - "${PROJECT_DIR}\\playbooks"
        - "${OUTPUT_DIR}"
        - "${OUTPUT_DIR}\\readiness_report.json"
        - "${OUTPUT_DIR}\\odoo_live_verify.json"
        - "${OUTPUT_DIR}\\odoo_instance_url.txt"
        - "${OUTPUT_DIR}\\odoo_instance_alias.txt"
        - "${OUTPUT_DIR}\\odoo_trial_page_probe_before.json"
        - "${OUTPUT_DIR}\\odoo_trial_before.png"
        - "${OUTPUT_DIR}\\odoo_trial_after.png"
        - "${OUTPUT_DIR}\\odoo_ecommerce_install_checkpoint.json"
        - "${OUTPUT_DIR}\\odoo_operations_core_checkpoint.json"
        - "${OUTPUT_DIR}\\odoo_dropshipping_ops_checkpoint.json"
        - "${OUTPUT_DIR}\\odoo_branding_checkpoint.json"
        - "${OUTPUT_DIR}\\wholesaler_integration_scaffold_checkpoint.json"
        - "${PROJECT_DIR}\\PRD.md"
        - "${PROJECT_DIR}\\SDD.md"
