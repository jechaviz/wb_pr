steps:
  - name: Validate repo sync artifact
    action: FS.Exists
    register: has_repo_sync
    params:
      path: "${OUTPUT_DIR}\\electroprice_repo.sync.json"

  - name: Validate Odoo URL artifact
    action: FS.Exists
    register: has_odoo_url
    params:
      path: "${OUTPUT_DIR}\\odoo_instance_url.txt"

  - name: Read Odoo URL artifact content
    if: "${has_odoo_url}"
    action: FS.ReadText
    register: odoo_url_value
    params:
      path: "${OUTPUT_DIR}\\odoo_instance_url.txt"

  - name: Validate Odoo URL content (must be provisioned instance)
    if: "${has_odoo_url}"
    action: Shell.RunJson
    register: odoo_url_content_check
    params:
      command: 'powershell -NoProfile -Command "$u = Get-Content -Raw -Path ''${OUTPUT_DIR}\\odoo_instance_url.txt''; $u = ($u | Out-String).Trim(); $ok = ($u -match ''\.odoo\.com'' -and $u -notmatch ''/trial'' -and $u -notmatch ''://www\.odoo\.com''); @{ ok = $ok; url = $u } | ConvertTo-Json -Compress; if ($ok) { exit 0 } else { exit 1 }"'
      allow_fail: true
      unsafe: true

  - name: Validate Odoo URL alias base (must belong to electroprice namespace)
    if: "${has_odoo_url}"
    action: Shell.RunJson
    register: odoo_url_alias_check
    params:
      command: 'powershell -NoProfile -Command "$u = Get-Content -Raw -Path ''${OUTPUT_DIR}\\odoo_instance_url.txt''; $u = ($u | Out-String).Trim(); $base = (''${ODOO_INSTANCE_ALIAS_BASE}'' | Out-String).Trim().ToLower(); $ok = $false; $odooHost = ''''; $sub = ''''; if ($u -ne '''') { try { $odooHost = ([uri]$u).Host.ToLower(); if ($odooHost -like ''*.odoo.com'' -and $odooHost -ne ''www.odoo.com'') { $sub = $odooHost -replace ''\.odoo\.com$'', ''''; $ok = ($sub -eq $base) -or ($sub -like ($base + ''-*'')) -or ($sub -match (''^'' + [regex]::Escape($base) + ''\d+$'')) } } catch { $ok = $false } }; @{ ok = $ok; url = $u; host = $odooHost; subdomain = $sub; expected_base = $base } | ConvertTo-Json -Compress; if ($ok) { exit 0 } else { exit 1 }"'
      allow_fail: true
      unsafe: true

  - name: Validate eCommerce checkpoint artifact
    action: FS.Exists
    register: has_ecommerce_checkpoint
    params:
      path: "${OUTPUT_DIR}\\odoo_ecommerce_install_checkpoint.json"

  - name: Validate operations core checkpoint artifact
    action: FS.Exists
    register: has_ops_core_checkpoint
    params:
      path: "${OUTPUT_DIR}\\odoo_operations_core_checkpoint.json"

  - name: Validate dropshipping ops checkpoint artifact
    action: FS.Exists
    register: has_dropship_checkpoint
    params:
      path: "${OUTPUT_DIR}\\odoo_dropshipping_ops_checkpoint.json"

  - name: Validate branding checkpoint artifact
    action: FS.Exists
    register: has_branding_checkpoint
    params:
      path: "${OUTPUT_DIR}\\odoo_branding_checkpoint.json"

  - name: Validate wholesaler scaffold checkpoint artifact
    action: FS.Exists
    register: has_wholesaler_scaffold
    params:
      path: "${OUTPUT_DIR}\\wholesaler_integration_scaffold_checkpoint.json"

  - name: Validate legacy migration checkpoint artifact
    action: FS.Exists
    register: has_legacy_migration_checkpoint
    params:
      path: "${OUTPUT_DIR}\\odoo_legacy_migration_checkpoint.json"

  - name: Validate Odoo solution bundle checkpoint artifact
    action: FS.Exists
    register: has_odoo_solution_bundle_checkpoint
    params:
      path: "${OUTPUT_DIR}\\odoo_solution_bundle_checkpoint.json"

  - name: Validate marketplace MVP checkpoint artifact
    action: FS.Exists
    register: has_marketplace_mvp_checkpoint
    params:
      path: "${OUTPUT_DIR}\\odoo_marketplace_mvp_checkpoint.json"

  - name: Validate storefront pages checkpoint artifact
    action: FS.Exists
    register: has_storefront_pages_checkpoint
    params:
      path: "${OUTPUT_DIR}\\odoo_storefront_pages_checkpoint.json"

  - name: Validate auth method trace artifact
    action: FS.Exists
    register: has_auth_method_trace
    params:
      path: "${OUTPUT_DIR}\\odoo_auth_method.txt"

  - name: Validate auth identity trace artifact
    action: FS.Exists
    register: has_auth_identity_trace
    params:
      path: "${OUTPUT_DIR}\\odoo_auth_identity.json"

  - name: Read auth method trace
    if: "${has_auth_method_trace}"
    action: FS.ReadText
    register: auth_method_value
    params:
      path: "${OUTPUT_DIR}\\odoo_auth_method.txt"

  - name: Validate auth method trace value
    if: "${has_auth_method_trace}"
    action: Shell.RunJson
    register: auth_method_check
    params:
      command: 'powershell -NoProfile -Command "$m = (''${auth_method_value}'' | Out-String).Trim().ToLower(); $ok = ($m -ne '''' -and $m -ne ''unknown''); @{ ok = $ok; method = $m } | ConvertTo-Json -Compress; if ($ok) { exit 0 } else { exit 1 }"'
      allow_fail: true
      unsafe: true

  - name: Read auth email trace (optional)
    action: FS.Exists
    register: has_auth_email_trace
    params:
      path: "${OUTPUT_DIR}\\odoo_auth_email_used.txt"

  - name: Read auth email trace value
    if: "${has_auth_email_trace}"
    action: FS.ReadText
    register: auth_email_value
    params:
      path: "${OUTPUT_DIR}\\odoo_auth_email_used.txt"

  - name: Connect to Odoo tab for live baseline verification
    if: "${has_odoo_url}"
    action: CDP.Connect
    params:
      port: "${DEBUG_PORT}"
      open_url: "${odoo_url_value}"
      target_type: page
      target_url_contains: ".odoo.com"

  - name: Navigate to Odoo URL for live baseline verification
    if: "${has_odoo_url}"
    confirm_progress: false
    action: CDP.Navigate
    params:
      port: "${DEBUG_PORT}"
      url: "${odoo_url_value}"
      wait_ms: 2000

  - name: Load Odoo baseline verifier script
    if: "${has_odoo_url}"
    action: FS.ReadText
    register: js_odoo_verify_baseline
    params:
      path: "${PLAYBOOKS_DIR}\\js\\odoo\\rpc_verify_baseline.js"

  - name: Execute live Odoo baseline verification
    if: "${has_odoo_url}"
    action: CDP.EvaluateJson
    register: odoo_live_verify
    params:
      port: "${DEBUG_PORT}"
      timeout_ms: 45000
      await_promise: true
      expression: "${js_odoo_verify_baseline}"

  - name: Persist live Odoo baseline verification artifact
    if: "${has_odoo_url}"
    action: FS.WriteJson
    params:
      path: "${OUTPUT_DIR}\\odoo_live_verify.json"
      overwrite: true
      value: "${odoo_live_verify}"

  - name: Validate live session identity (uid + login)
    if: "${has_odoo_url}"
    action: Shell.RunJson
    register: live_session_identity_check
    params:
      command: 'powershell -NoProfile -Command "$uid = [int](''${odoo_live_verify.session_uid}'' -as [int]); $login = (''${odoo_live_verify.session_login}'' | Out-String).Trim(); $ok = ($uid -gt 0 -and $login -ne ''''); @{ ok = $ok; uid = $uid; login = $login } | ConvertTo-Json -Compress; if ($ok) { exit 0 } else { exit 1 }"'
      allow_fail: true
      unsafe: true

  - name: Load Odoo migration parity verifier script
    if: "${has_odoo_url}"
    action: FS.ReadText
    register: js_odoo_verify_migration_parity
    params:
      path: "${PLAYBOOKS_DIR}\\js\\odoo\\rpc_verify_migration_parity.js"

  - name: Execute live Odoo migration parity verification
    if: "${has_odoo_url}"
    action: CDP.EvaluateJson
    register: odoo_live_migration_verify
    params:
      port: "${DEBUG_PORT}"
      timeout_ms: 120000
      await_promise: true
      expression: "${js_odoo_verify_migration_parity}"

  - name: Persist live Odoo migration parity artifact
    if: "${has_odoo_url}"
    action: FS.WriteJson
    params:
      path: "${OUTPUT_DIR}\\odoo_live_migration_verify.json"
      overwrite: true
      value: "${odoo_live_migration_verify}"

  - name: Load Odoo solution bundle verifier script
    if: "${has_odoo_url}"
    action: FS.ReadText
    register: js_odoo_verify_solution_bundle
    params:
      path: "${PLAYBOOKS_DIR}\\js\\odoo\\rpc_verify_solution_bundle.js"

  - name: Execute live Odoo solution bundle verification
    if: "${has_odoo_url}"
    action: CDP.EvaluateJson
    register: odoo_live_solution_bundle_verify
    params:
      port: "${DEBUG_PORT}"
      timeout_ms: 45000
      await_promise: true
      expression: "${js_odoo_verify_solution_bundle}"

  - name: Persist live Odoo solution bundle verification artifact
    if: "${has_odoo_url}"
    action: FS.WriteJson
    params:
      path: "${OUTPUT_DIR}\\odoo_live_solution_bundle_verify.json"
      overwrite: true
      value: "${odoo_live_solution_bundle_verify}"

  - name: Load Odoo marketplace MVP verifier script
    if: "${has_odoo_url}"
    action: FS.ReadText
    register: js_odoo_verify_marketplace_mvp
    params:
      path: "${PLAYBOOKS_DIR}\\js\\odoo\\rpc_verify_marketplace_mvp.js"

  - name: Execute live Odoo marketplace MVP verification
    if: "${has_odoo_url}"
    action: CDP.EvaluateJson
    register: odoo_live_marketplace_mvp_verify
    params:
      port: "${DEBUG_PORT}"
      timeout_ms: 45000
      await_promise: true
      expression: "${js_odoo_verify_marketplace_mvp}"

  - name: Persist live Odoo marketplace MVP verification artifact
    if: "${has_odoo_url}"
    action: FS.WriteJson
    params:
      path: "${OUTPUT_DIR}\\odoo_live_marketplace_mvp_verify.json"
      overwrite: true
      value: "${odoo_live_marketplace_mvp_verify}"

  - name: Load Odoo storefront pages verifier script
    if: "${has_odoo_url}"
    action: FS.ReadText
    register: js_odoo_verify_storefront_pages
    params:
      path: "${PLAYBOOKS_DIR}\\js\\odoo\\rpc_verify_storefront_pages.js"

  - name: Execute live Odoo storefront pages verification
    if: "${has_odoo_url}"
    action: CDP.EvaluateJson
    register: odoo_live_storefront_pages_verify
    params:
      port: "${DEBUG_PORT}"
      timeout_ms: 45000
      await_promise: true
      expression: "${js_odoo_verify_storefront_pages}"

  - name: Persist live Odoo storefront pages verification artifact
    if: "${has_odoo_url}"
    action: FS.WriteJson
    params:
      path: "${OUTPUT_DIR}\\odoo_live_storefront_pages_verify.json"
      overwrite: true
      value: "${odoo_live_storefront_pages_verify}"

  - name: Build readiness report
    action: FS.WriteJson
    params:
      path: "${OUTPUT_DIR}\\readiness_report.json"
      overwrite: true
      value:
        ok: true
        checks:
          repo_sync: "${has_repo_sync}"
          odoo_url: "${has_odoo_url}"
          odoo_url_value: "${odoo_url_value}"
          odoo_url_content_exit_code: "${odoo_url_content_check.exit_code}"
          odoo_url_content_ok: "${odoo_url_content_check.json.ok}"
          odoo_url_content_url: "${odoo_url_content_check.json.url}"
          odoo_url_alias_exit_code: "${odoo_url_alias_check.exit_code}"
          odoo_url_alias_ok: "${odoo_url_alias_check.json.ok}"
          odoo_url_alias_subdomain: "${odoo_url_alias_check.json.subdomain}"
          odoo_url_alias_expected_base: "${odoo_url_alias_check.json.expected_base}"
          ecommerce_checkpoint: "${has_ecommerce_checkpoint}"
          operations_core_checkpoint: "${has_ops_core_checkpoint}"
          dropshipping_ops_checkpoint: "${has_dropship_checkpoint}"
          branding_checkpoint: "${has_branding_checkpoint}"
          wholesaler_scaffold_checkpoint: "${has_wholesaler_scaffold}"
          legacy_migration_checkpoint: "${has_legacy_migration_checkpoint}"
          odoo_solution_bundle_checkpoint: "${has_odoo_solution_bundle_checkpoint}"
          marketplace_mvp_checkpoint: "${has_marketplace_mvp_checkpoint}"
          storefront_pages_checkpoint: "${has_storefront_pages_checkpoint}"
          auth_method_trace: "${has_auth_method_trace}"
          auth_identity_trace: "${has_auth_identity_trace}"
          auth_method_ok: "${auth_method_check.json.ok}"
          auth_method: "${auth_method_check.json.method}"
          auth_email_trace: "${has_auth_email_trace}"
          auth_email_value: "${auth_email_value}"
          odoo_live_verify_ok: "${odoo_live_verify.ok}"
          odoo_live_verify_session_uid: "${odoo_live_verify.session_uid}"
          odoo_live_verify_session_login: "${odoo_live_verify.session_login}"
          odoo_live_verify_session_identity_ok: "${odoo_live_verify.session_identity_ok}"
          odoo_live_verify_session_identity_check_ok: "${live_session_identity_check.json.ok}"
          odoo_live_verify_missing_modules: "${odoo_live_verify.missing_modules}"
          odoo_live_verify_company_brand_ok: "${odoo_live_verify.company_brand_ok}"
          odoo_live_verify_website_brand_ok: "${odoo_live_verify.website_brand_ok}"
          odoo_live_verify_has_drop_routes: "${odoo_live_verify.has_drop_routes}"
          odoo_live_migration_verify_ok: "${odoo_live_migration_verify.ok}"
          odoo_live_migration_missing_categories: "${odoo_live_migration_verify.missing_categories}"
          odoo_live_migration_missing_suppliers: "${odoo_live_migration_verify.missing_suppliers}"
          odoo_live_migration_missing_products: "${odoo_live_migration_verify.missing_products}"
          odoo_live_migration_products_without_supplier_lines: "${odoo_live_migration_verify.products_without_supplier_lines}"
          odoo_live_solution_bundle_verify_ok: "${odoo_live_solution_bundle_verify.ok}"
          odoo_live_solution_bundle_missing_actions: "${odoo_live_solution_bundle_verify.missing_actions}"
          odoo_live_solution_bundle_missing_public_categories: "${odoo_live_solution_bundle_verify.missing_public_categories}"
          odoo_live_solution_bundle_missing_frontend_assignments: "${odoo_live_solution_bundle_verify.missing_frontend_assignments}"
          odoo_live_marketplace_mvp_verify_ok: "${odoo_live_marketplace_mvp_verify.ok}"
          odoo_live_marketplace_mvp_missing_suppliers: "${odoo_live_marketplace_mvp_verify.missing_suppliers}"
          odoo_live_marketplace_mvp_missing_channels: "${odoo_live_marketplace_mvp_verify.missing_channels}"
          odoo_live_marketplace_mvp_missing_carriers: "${odoo_live_marketplace_mvp_verify.missing_carriers}"
          odoo_live_marketplace_mvp_carriers_without_tracking_url: "${odoo_live_marketplace_mvp_verify.carriers_without_tracking_url}"
          odoo_live_marketplace_mvp_missing_pricelists: "${odoo_live_marketplace_mvp_verify.missing_pricelists}"
          odoo_live_marketplace_mvp_missing_connector_keys: "${odoo_live_marketplace_mvp_verify.missing_connector_keys}"
          odoo_live_marketplace_mvp_has_website_page_model: "${odoo_live_marketplace_mvp_verify.has_website_page_model}"
          odoo_live_marketplace_mvp_missing_portal_pages: "${odoo_live_marketplace_mvp_verify.missing_portal_pages}"
          odoo_live_storefront_pages_verify_ok: "${odoo_live_storefront_pages_verify.ok}"
          odoo_live_storefront_pages_home_markers_ok: "${odoo_live_storefront_pages_verify.homepage.markers_ok}"
          odoo_live_storefront_pages_home_missing_markers: "${odoo_live_storefront_pages_verify.homepage.missing_markers}"
          odoo_live_storefront_pages_product_markers_ok: "${odoo_live_storefront_pages_verify.product_enhancement_view.markers_ok}"
          odoo_live_storefront_pages_product_missing_markers: "${odoo_live_storefront_pages_verify.product_enhancement_view.missing_markers}"

  - name: Abort if repo sync artifact is missing
    if_not: "${has_repo_sync}"
    action: Shell.Run
    params:
      command: "exit 1"

  - name: Abort if Odoo URL artifact is missing
    if_not: "${has_odoo_url}"
    action: Shell.Run
    params:
      command: "exit 1"

  - name: Abort if Odoo URL content is invalid
    if: "${odoo_url_content_check.exit_code}"
    action: Shell.Run
    params:
      command: "exit 1"

  - name: Abort if Odoo URL alias base is invalid
    if: "${odoo_url_alias_check.exit_code}"
    action: Shell.Run
    params:
      command: "exit 1"

  - name: Abort if eCommerce checkpoint is missing
    if_not: "${has_ecommerce_checkpoint}"
    action: Shell.Run
    params:
      command: "exit 1"

  - name: Abort if operations core checkpoint is missing
    if_not: "${has_ops_core_checkpoint}"
    action: Shell.Run
    params:
      command: "exit 1"

  - name: Abort if dropshipping checkpoint is missing
    if_not: "${has_dropship_checkpoint}"
    action: Shell.Run
    params:
      command: "exit 1"

  - name: Abort if branding checkpoint is missing
    if_not: "${has_branding_checkpoint}"
    action: Shell.Run
    params:
      command: "exit 1"

  - name: Abort if wholesaler scaffold checkpoint is missing
    if_not: "${has_wholesaler_scaffold}"
    action: Shell.Run
    params:
      command: "exit 1"

  - name: Abort if legacy migration checkpoint is missing
    if_not: "${has_legacy_migration_checkpoint}"
    action: Shell.Run
    params:
      command: "exit 1"

  - name: Abort if Odoo solution bundle checkpoint is missing
    if_not: "${has_odoo_solution_bundle_checkpoint}"
    action: Shell.Run
    params:
      command: "exit 1"

  - name: Abort if marketplace MVP checkpoint is missing
    if_not: "${has_marketplace_mvp_checkpoint}"
    action: Shell.Run
    params:
      command: "exit 1"

  - name: Abort if storefront pages checkpoint is missing
    if_not: "${has_storefront_pages_checkpoint}"
    action: Shell.Run
    params:
      command: "exit 1"

  - name: Abort if auth method trace is missing
    if_not: "${has_auth_method_trace}"
    action: Shell.Run
    params:
      command: "exit 1"

  - name: Abort if auth identity trace is missing
    if_not: "${has_auth_identity_trace}"
    action: Shell.Run
    params:
      command: "exit 1"

  - name: Abort if auth method trace is invalid
    if: "${auth_method_check.exit_code}"
    action: Shell.Run
    params:
      command: "exit 1"

  - name: Abort if live Odoo verification failed
    if_not: "${odoo_live_verify.ok}"
    action: Shell.Run
    params:
      command: "exit 1"

  - name: Abort if live session identity is not verified
    if: "${live_session_identity_check.exit_code}"
    action: Shell.Run
    params:
      command: "exit 1"

  - name: Abort if live Odoo migration parity verification failed
    if_not: "${odoo_live_migration_verify.ok}"
    action: Shell.Run
    params:
      command: "exit 1"

  - name: Abort if live Odoo solution bundle verification failed
    if_not: "${odoo_live_solution_bundle_verify.ok}"
    action: Shell.Run
    params:
      command: "exit 1"

  - name: Abort if live Odoo marketplace MVP verification failed
    if_not: "${odoo_live_marketplace_mvp_verify.ok}"
    action: Shell.Run
    params:
      command: "exit 1"

  - name: Abort if live Odoo storefront pages verification failed
    if_not: "${odoo_live_storefront_pages_verify.ok}"
    action: Shell.Run
    params:
      command: "exit 1"
