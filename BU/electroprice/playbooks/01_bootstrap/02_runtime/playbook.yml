steps:
  - name: Ensure output directory exists
    action: FS.EnsureDir
    params:
      path: "${OUTPUT_DIR}"

  - name: Check if project secrets.yml exists
    action: FS.Exists
    register: has_project_secrets_yml
    params:
      path: "${PROJECT_DIR}\\secrets.yml"

  - name: Auto-create project secrets.yml when missing
    if_not: "${has_project_secrets_yml}"
    action: FS.WriteText
    params:
      path: "${PROJECT_DIR}\\secrets.yml"
      overwrite: false
      text: |
        # Project-local secrets (not committed)
        # Override only what this project needs.
        odoo.login_email: ""
        odoo.login_password: ""
        odoo.trial_email: ""
        odoo.trial_phone: ""

  - name: Apply WAIBA policy roots and global skill registry
    action: Framework.Policy.Apply
    register: waiba_policy
    params:
      category: "ecommerce"
      subcategory: "dropshipping"
      project_dir: "${PROJECT_DIR}"

  - name: Export WAIBA reusable skills root into context
    action: Set
    params:
      name: WAIBA_SKILLS_DIR
      value: "${waiba_policy.skills_root}"

  - name: Export migrated WAIBA shared playbook library root into context
    action: Set
    params:
      name: WAIBA_PLAYBOOK_LIB_DIR
      value: "C:\\git\\wb_pr\\_shared"

  - name: Import project skills from skills.yml
    action: Framework.Policy.ImportSkills
    register: waiba_skills_import
    params:
      project_dir: "${PROJECT_DIR}"
      project_name: "${PROJECT_NAME}"
      category: "ecommerce"
      subcategory: "dropshipping"
      project_skill_path: "${PROJECT_SKILL_PATH}"

  - name: Enforce autonomy policy contract
    action: Framework.Policy.EnsureAutonomy
    register: waiba_autonomy_policy
    params:
      project_dir: "${PROJECT_DIR}"
      project_name: "${PROJECT_NAME}"
      category: "ecommerce"
      subcategory: "dropshipping"
      task_name: "${TASK_NAME}"
      task_summary: "${TASK_SUMMARY}"
