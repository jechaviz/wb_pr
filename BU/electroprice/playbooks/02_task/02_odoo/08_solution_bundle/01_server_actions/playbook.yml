steps:
  - name: Ensure ODOO_URL exists
    if_not: "${ODOO_URL}"
    action: Fail
    params:
      text: "Missing ODOO_URL before server actions configuration."

  - name: Connect to Odoo tab
    action: CDP.Connect
    params:
      port: "${DEBUG_PORT}"
      open_url: "${ODOO_URL}"
      target_type: page
      target_url_contains: ".odoo.com"

  - name: Navigate to Odoo instance
    confirm_progress: false
    action: CDP.Navigate
    params:
      port: "${DEBUG_PORT}"
      url: "${ODOO_URL}"
      wait_ms: 2000

  - name: Load server actions configurator script
    action: FS.ReadText
    register: js_odoo_configure_server_actions
    params:
      path: "${PLAYBOOKS_DIR}\\js\\odoo\\rpc_configure_server_actions.js"

  - name: Execute Odoo server actions configuration
    action: CDP.EvaluateJson
    register: odoo_server_actions_result
    params:
      port: "${DEBUG_PORT}"
      await_promise: true
      expression: "${js_odoo_configure_server_actions}"

  - name: Abort if server actions did not configure
    if_not: "${odoo_server_actions_result.ok}"
    action: Fail
    params:
      text: "Server actions configuration failed: ${odoo_server_actions_result.error}${odoo_server_actions_result.reason}"
