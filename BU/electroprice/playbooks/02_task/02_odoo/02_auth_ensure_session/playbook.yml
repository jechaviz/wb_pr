steps:
  - name: Ensure ODOO_URL is present
    if_not: "${ODOO_URL}"
    action: Fail
    params:
      text: "Missing ODOO_URL. Cannot ensure authenticated Odoo session."

  - name: Connect to Odoo tab (CDP)
    action: CDP.Connect
    params:
      port: "${DEBUG_PORT}"
      open_url: "${ODOO_URL}"
      target_type: page
      target_url_contains: ".odoo.com"

  - name: Navigate to Odoo URL
    action: CDP.Navigate
    params:
      port: "${DEBUG_PORT}"
      url: "${ODOO_URL}"
      wait_ms: 2800

  - name: Resolve website configurator interstitial (if present)
    action: Helium.ResolveInterstitial
    register: odoo_configurator_resolve
    confirm_progress: false
    params:
      port: "${DEBUG_PORT}"
      url_contains: "/website/configurator"
      url_not_contains: "/website/configurator"
      timeout_secs: 25
      auto_candidates: true
      implicit_wait_ms: 1200
      retry_interval_ms: 150

  - name: Abort if website configurator is still blocking
    if: "${odoo_configurator_resolve.active}"
    if_not: "${odoo_configurator_resolve.handled}"
    action: Fail
    params:
      text: |
        Odoo website configurator is still blocking flow.
        Resolution data: ${odoo_configurator_resolve}

  - name: Resolve activation interstitial (if present)
    action: Helium.ResolveInterstitial
    register: odoo_activation_pending_resolve
    ignore_errors: true
    confirm_progress: false
    params:
      port: "${DEBUG_PORT}"
      timeout_secs: 10
      auto_candidates: true
      implicit_wait_ms: 1000
      retry_interval_ms: 140
      active_text_keywords:
        - "activación pendiente"
        - "activation pending"

  - name: Attempt activation via Yopmail (playbook-only online flow)
    if: "${odoo_activation_pending_resolve.active}"
    if_not: "${odoo_activation_pending_resolve.handled}"
    playbook: "./01_activation_via_yopmail/playbook.yml"

  - name: Re-check activation interstitial after Yopmail attempt
    if: "${odoo_activation_pending_resolve.active}"
    if_not: "${odoo_activation_pending_resolve.handled}"
    action: Helium.ResolveInterstitial
    register: odoo_activation_pending_resolve
    ignore_errors: true
    confirm_progress: false
    params:
      port: "${DEBUG_PORT}"
      timeout_secs: 10
      auto_candidates: true
      implicit_wait_ms: 1000
      retry_interval_ms: 140
      active_text_keywords:
        - "activación pendiente"
        - "activation pending"

  - name: Abort if activation interstitial is still blocking
    if: "${odoo_activation_pending_resolve.active}"
    if_not: "${odoo_activation_pending_resolve.handled}"
    action: Fail
    params:
      text: |
        Odoo activation flow is still blocking execution.
        This instance requires email activation before authenticated setup can continue.
        Resolution data: ${odoo_activation_pending_resolve}

  - name: Check if login page is visible
    action: Helium.Exists
    register: odoo_login_visible
    confirm_progress: false
    params:
      port: "${DEBUG_PORT}"
      element:
        kind: s
        selector: "form[action*='/web/login'], input[name='login'], input[type='password']"

  - name: Initialize auth tracking defaults
    action: Set
    confirm_progress: false
    params:
      name: ODOO_AUTH_METHOD
      value: "unknown"

  - name: Initialize auth email tracking
    action: Set
    confirm_progress: false
    params:
      name: ODOO_AUTH_EMAIL_USED
      value: ""

  - name: Login with configured credentials
    if: "${odoo_login_visible.exists}"
    steps:
      - name: Track auth method as explicit credentials
        if: "${ODOO_LOGIN_EMAIL}"
        action: Set
        confirm_progress: false
        params:
          name: ODOO_AUTH_METHOD
          value: "credentials"

      - name: Track login email from secrets
        if: "${ODOO_LOGIN_EMAIL}"
        action: Set
        confirm_progress: false
        params:
          name: ODOO_AUTH_EMAIL_USED
          value: "${ODOO_LOGIN_EMAIL}"

      - name: Fill login email (from secrets)
        if: "${ODOO_LOGIN_EMAIL}"
        action: Helium.Write
        confirm_progress: false
        params:
          port: "${DEBUG_PORT}"
          text: "${ODOO_LOGIN_EMAIL}"
          into:
            kind: s
            selector: "input[name='login'], input[type='email'], input[autocomplete='username'], input[autocomplete='email']"
          implicit_wait_ms: 5000
          retry_interval_ms: 150

      - name: Fill login password (from secrets)
        if: "${ODOO_LOGIN_PASSWORD}"
        action: Helium.Write
        confirm_progress: false
        params:
          port: "${DEBUG_PORT}"
          text: "${ODOO_LOGIN_PASSWORD}"
          into:
            kind: s
            selector: "input[type='password'], input[name='password'], input[autocomplete='current-password']"
          implicit_wait_ms: 5000
          retry_interval_ms: 150

      - name: Click Sign in button (credential path)
        if: "${ODOO_LOGIN_EMAIL}"
        action: Helium.Click
        register: odoo_signin_click
        ignore_errors: true
        confirm_progress: false
        params:
          port: "${DEBUG_PORT}"
          element:
            kind: s
            selector: "button[type='submit'], button.btn-primary"
          implicit_wait_ms: 3500
          retry_interval_ms: 150

      - name: Fallback click Sign in by text (credential path)
        if: "${ODOO_LOGIN_EMAIL}"
        if_not: "${odoo_signin_click.ok}"
        learn:
          key: "odoo.auth.signin_label"
          success_if: "${odoo_signin_click.ok}"
          value: "${loop.item}"
          strict: true
          export_var: "ODOO_SIGNIN_LABEL_HIT"
          prune:
            enabled: true
            marker_begin: "BEGIN_SIGNIN_LABEL_CANDIDATES"
            marker_end: "END_SIGNIN_LABEL_CANDIDATES"
        loop:
          # BEGIN_SIGNIN_LABEL_CANDIDATES
          - "Sign in"
          - "Iniciar sesion"
          - "Log in"
          # END_SIGNIN_LABEL_CANDIDATES
        steps:
          - name: Click auth button by text: ${loop.item}
            action: Helium.Click
            register: odoo_signin_click
            ignore_errors: true
            confirm_progress: false
            params:
              port: "${DEBUG_PORT}"
              element:
                kind: button
                text: "${loop.item}"
              implicit_wait_ms: 1200
              retry_interval_ms: 150
          - break_if: "${odoo_signin_click.ok}"

      - name: Persist learned Sign in label
        if: "${ODOO_SIGNIN_LABEL_HIT}"
        action: FS.WriteText
        confirm_progress: false
        params:
          path: "${OUTPUT_DIR}\\odoo_signin_label.txt"
          text: "${ODOO_SIGNIN_LABEL_HIT}"
          overwrite: true

  - name: Login with browser autofill fallback
    if: "${odoo_login_visible.exists}"
    if_not: "${ODOO_LOGIN_EMAIL}"
    steps:
      - name: Track auth method as browser autofill
        action: Set
        confirm_progress: false
        params:
          name: ODOO_AUTH_METHOD
          value: "browser_autofill"

      - name: Focus login field
        action: Helium.ClickNative
        ignore_errors: true
        confirm_progress: false
        params:
          port: "${DEBUG_PORT}"
          element:
            kind: s
            selector: "input[name='login'], input[type='email'], input[autocomplete='username'], input[autocomplete='email']"
          implicit_wait_ms: 2500
          retry_interval_ms: 150

      - name: Pick first saved login suggestion
        action: Helium.Press
        confirm_progress: false
        params:
          port: "${DEBUG_PORT}"
          key: "DOWN"

      - name: Accept saved login suggestion
        action: Helium.Press
        confirm_progress: false
        params:
          port: "${DEBUG_PORT}"
          key: "ENTER"

      - name: Read selected autofill login value
        action: Helium.GetValue
        register: odoo_autofill_login_value
        ignore_errors: true
        confirm_progress: false
        params:
          port: "${DEBUG_PORT}"
          element:
            kind: s
            selector: "input[name='login'], input[type='email'], input[autocomplete='username'], input[autocomplete='email']"

      - name: Track autofill login value
        if: "${odoo_autofill_login_value.value}"
        action: Set
        confirm_progress: false
        params:
          name: ODOO_AUTH_EMAIL_USED
          value: "${odoo_autofill_login_value.value}"

      - name: Focus password field
        action: Helium.ClickNative
        ignore_errors: true
        confirm_progress: false
        params:
          port: "${DEBUG_PORT}"
          element:
            kind: s
            selector: "input[type='password'], input[name='password'], input[autocomplete='current-password']"
          implicit_wait_ms: 2500
          retry_interval_ms: 150

      - name: Pick first saved password suggestion
        action: Helium.Press
        confirm_progress: false
        params:
          port: "${DEBUG_PORT}"
          key: "DOWN"

      - name: Accept saved password suggestion
        action: Helium.Press
        confirm_progress: false
        params:
          port: "${DEBUG_PORT}"
          key: "ENTER"

      - name: Submit login after autofill
        action: Helium.Press
        confirm_progress: false
        params:
          port: "${DEBUG_PORT}"
          key: "ENTER"

  - name: Wait until login page is gone
    if: "${odoo_login_visible.exists}"
    action: Helium.WaitUntilUrl
    register: odoo_login_redirect
    ignore_errors: true
    confirm_progress: false
    params:
      port: "${DEBUG_PORT}"
      host_endswith: ".odoo.com"
      url_not_contains: "/web/login"
      timeout_secs: 25
      interval_ms: 400

  - name: Check login page after auth attempt
    action: Helium.Exists
    register: odoo_login_still_visible
    confirm_progress: false
    params:
      port: "${DEBUG_PORT}"
      element:
        kind: s
        selector: "form[action*='/web/login'], input[name='login'], input[type='password']"

  - name: Track auth method as existing session
    if_not: "${odoo_login_visible.exists}"
    action: Set
    confirm_progress: false
    params:
      name: ODOO_AUTH_METHOD
      value: "existing_session"

  - name: Probe authenticated identity from Odoo web client
    action: CDP.EvaluateJson
    register: odoo_session_identity
    ignore_errors: true
    confirm_progress: false
    params:
      port: "${DEBUG_PORT}"
      timeout_ms: 12000
      expression: "(() => { try { const s = (window.odoo && (window.odoo.__session_info__ || window.odoo.session_info)) || null; const uid = Number((s && (s.uid || s.user_id)) || 0); const login = (s && (s.username || s.login || s.user_login || '')) || ''; const db = (s && (s.db || '')) || ''; const name = (s && (s.name || '')) || ''; return { ok: uid > 0, uid, login, db, name, source: s ? 'window.odoo.session_info' : 'missing' }; } catch (e) { return { ok: false, error: String(e) }; } })()"

  - name: Probe authenticated identity via Odoo session RPC
    action: CDP.EvaluateJson
    register: odoo_session_identity_rpc
    ignore_errors: true
    confirm_progress: false
    params:
      port: "${DEBUG_PORT}"
      timeout_ms: 15000
      await_promise: true
      expression: "(async () => { try { const payload = { jsonrpc: '2.0', method: 'call', params: {} }; const res = await fetch('/web/session/get_session_info', { method: 'POST', credentials: 'include', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) }); const text = await res.text(); let body = null; try { body = JSON.parse(text); } catch (_e) { return { ok: false, source: 'rpc.get_session_info', status: res.status, error: 'non_json', body_preview: text.slice(0, 200) }; } const info = body && body.result ? body.result : {}; const uid = Number(info.uid || (Array.isArray(info.user_id) ? info.user_id[0] : info.user_id) || 0); const login = (info.username || info.login || info.user_login || ''); const db = (info.db || ''); const name = (info.name || ''); return { ok: uid > 0 || !!login, uid, login, db, name, source: 'rpc.get_session_info', status: res.status }; } catch (e) { return { ok: false, source: 'rpc.get_session_info', error: String(e) }; } })()"

  - name: Backfill auth email from active session identity
    if_not: "${ODOO_AUTH_EMAIL_USED}"
    if: "${odoo_session_identity.login}"
    action: Set
    confirm_progress: false
    params:
      name: ODOO_AUTH_EMAIL_USED
      value: "${odoo_session_identity.login}"

  - name: Backfill auth email from session RPC identity
    if_not: "${ODOO_AUTH_EMAIL_USED}"
    if: "${odoo_session_identity_rpc.login}"
    action: Set
    confirm_progress: false
    params:
      name: ODOO_AUTH_EMAIL_USED
      value: "${odoo_session_identity_rpc.login}"

  - name: Persist auth email trace
    if: "${ODOO_AUTH_EMAIL_USED}"
    action: FS.WriteText
    confirm_progress: false
    params:
      path: "${OUTPUT_DIR}\\odoo_auth_email_used.txt"
      text: "${ODOO_AUTH_EMAIL_USED}"
      overwrite: true

  - name: Persist auth method trace
    action: FS.WriteText
    confirm_progress: false
    params:
      path: "${OUTPUT_DIR}\\odoo_auth_method.txt"
      text: "${ODOO_AUTH_METHOD}"
      overwrite: true

  - name: Persist auth identity probe
    action: FS.WriteJson
    confirm_progress: false
    params:
      path: "${OUTPUT_DIR}\\odoo_auth_identity.json"
      overwrite: true
      value:
        ui_probe: "${odoo_session_identity}"
        rpc_probe: "${odoo_session_identity_rpc}"

  - name: Abort if session is still unauthenticated
    if: "${odoo_login_visible.exists}"
    steps:
      - name: Capture auth debug screenshot
        if: "${odoo_login_still_visible.exists}"
        action: DemoCreator.CaptureScreenshot
        ignore_errors: true
        confirm_progress: false
        params:
          port: "${DEBUG_PORT}"
          target_type: page
          target_url_contains: ".odoo.com"
          output_path: "${OUTPUT_DIR}\\auth_login_debug.png"
          format: "png"

      - name: Capture auth debug probe
        if: "${odoo_login_still_visible.exists}"
        action: Helium.Probe
        register: odoo_auth_debug_probe
        ignore_errors: true
        confirm_progress: false
        params:
          port: "${DEBUG_PORT}"

      - name: Persist auth debug bundle
        if: "${odoo_login_still_visible.exists}"
        action: FS.WriteJson
        ignore_errors: true
        confirm_progress: false
        params:
          path: "${OUTPUT_DIR}\\odoo_auth_debug.json"
          overwrite: true
          value:
            ok: false
            reason: "login_form_still_visible"
            odoo_url: "${ODOO_URL}"
            learned_signin_label: "${ODOO_SIGNIN_LABEL_HIT}"
            guidance_hierarchy:
              - "1) Use DOM semantic selector first (button[type=submit], btn-primary)."
              - "2) Use learned localized text label if available."
              - "3) Use Ctrl+F style targeting via Helium.FindInPage."
              - "4) Use OCR/vision fallback with evidence screenshots."
            probe: "${odoo_auth_debug_probe}"

      - name: Fail when login form is still visible after auth attempt
        if: "${odoo_login_still_visible.exists}"
        action: Fail
        params:
          text: |
            Could not authenticate into Odoo automatically.
            Provide valid credentials in secrets (`odoo.login_email`/`odoo.login_password`)
            or ensure browser saved credentials are available.
            Debug artifacts:
            - ${OUTPUT_DIR}\\auth_login_debug.png
            - ${OUTPUT_DIR}\\odoo_auth_debug.json

  - name: Persist authenticated session checkpoint
    action: FS.WriteJson
    params:
      path: "${OUTPUT_DIR}\\odoo_session_checkpoint.json"
      overwrite: true
      value:
        ok: true
        odoo_url: "${ODOO_URL}"
        auth_method: "${ODOO_AUTH_METHOD}"
        auth_email_used: "${ODOO_AUTH_EMAIL_USED}"
        auth_identity: "${odoo_session_identity}"
        auth_identity_rpc: "${odoo_session_identity_rpc}"
        website_configurator_active: "${odoo_configurator_resolve.active}"
        website_configurator_handled: "${odoo_configurator_resolve.handled}"
        activation_pending_active: "${odoo_activation_pending_resolve.active}"
        activation_pending_handled: "${odoo_activation_pending_resolve.handled}"
        login_page_initially_visible: "${odoo_login_visible.exists}"
        login_page_still_visible: "${odoo_login_still_visible.exists}"
        learned_signin_label: "${ODOO_SIGNIN_LABEL_HIT}"
