steps:
  - name: Ensure WAIBA_PLAYBOOK_LIB_DIR is available
    if_not: "${WAIBA_PLAYBOOK_LIB_DIR}"
    action: Fail
    params:
      text: "Missing WAIBA_PLAYBOOK_LIB_DIR before reusable Odoo module install."

  - name: Install operations core modules via reusable Odoo RPC skill
    playbook: "${WAIBA_PLAYBOOK_LIB_DIR}\\odoo\\odoo-rpc-playbooks\\playbooks\\01_modules_ensure\\playbook.yml"
    with:
      ODOO_MODULE_NAMES:
        - website
        - sale_management
        - purchase
        - stock
        - account
      ODOO_MODULES_INSTALL_TIMEOUT_MS: 360000
      ODOO_MODULES_POLL_MS: 2000
      ODOO_CHECKPOINT_PATH: "${OUTPUT_DIR}\\odoo_operations_core_checkpoint.json"
