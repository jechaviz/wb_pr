steps:
  - name: Ensure WAIBA shared playbook library root is available
    if_not: "${WAIBA_PLAYBOOK_LIB_DIR}"
    action: Fail
    params:
      text: "Missing WAIBA_PLAYBOOK_LIB_DIR in context. Run bootstrap runtime policy first."

  - name: Import reusable Odoo instance configuration flow
    playbook: "${WAIBA_PLAYBOOK_LIB_DIR}\\ecommerce\\odoo-online-playbooks\\playbooks\\02_instance_configure\\playbook.yml"

  - name: Apply Electroprice storefront pages polish (homepage + product page)
    playbook: "../10_storefront_pages/playbook.yml"
