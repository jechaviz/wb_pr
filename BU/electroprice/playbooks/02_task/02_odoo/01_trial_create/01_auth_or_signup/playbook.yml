steps:
  - name: Check for login page (best-effort)
    if_not: "${odoo_url_meta_pre.is_instance}"
    action: Helium.WaitUntilUrl
    register: login_page_meta
    ignore_errors: true
    confirm_progress: false
    params:
      port: "${DEBUG_PORT}"
      url_contains: "/web/login"
      timeout_secs: 2
      interval_ms: 200

  - name: Login (autonomous)
    if_not: "${odoo_url_meta_pre.is_instance}"
    if: "${login_page_meta.ok}"
    steps:
      - name: Try fill login email from secrets
        if: "${ODOO_LOGIN_EMAIL}"
        action: Helium.Write
        confirm_after_wait_ms: 500
        params:
          port: "${DEBUG_PORT}"
          text: "${ODOO_LOGIN_EMAIL}"
          into:
            kind: s
            selector: "input[name='login'], input[type='email'], input[autocomplete='username'], input[autocomplete='email']"
          implicit_wait_ms: 6000
          retry_interval_ms: 200

      - name: Password manager pick email (best-effort)
        if_not: "${ODOO_LOGIN_EMAIL}"
        confirm_progress: false
        steps:
          - action: Helium.ClickNative
            ignore_errors: true
            confirm_progress: false
            params:
              port: "${DEBUG_PORT}"
              element:
                kind: s
                selector: "input[name='login'], input[type='email'], input[autocomplete='username'], input[autocomplete='email']"
              implicit_wait_ms: 1500
              retry_interval_ms: 150
          - action: Helium.Press
            confirm_progress: false
            params:
              port: "${DEBUG_PORT}"
              key: "DOWN"
          - action: Helium.Press
            confirm_progress: false
            params:
              port: "${DEBUG_PORT}"
              key: "ENTER"

      - name: Try fill password from secrets
        if: "${ODOO_LOGIN_PASSWORD}"
        action: Helium.Write
        confirm_after_wait_ms: 500
        params:
          port: "${DEBUG_PORT}"
          text: "${ODOO_LOGIN_PASSWORD}"
          into:
            kind: s
            selector: "input[type='password'], input[autocomplete='current-password'], input[name='password']"
          implicit_wait_ms: 6000
          retry_interval_ms: 200

      - name: Password manager pick password (best-effort)
        if_not: "${ODOO_LOGIN_PASSWORD}"
        confirm_progress: false
        steps:
          - action: Helium.ClickNative
            ignore_errors: true
            confirm_progress: false
            params:
              port: "${DEBUG_PORT}"
              element:
                kind: s
                selector: "input[type='password'], input[autocomplete='current-password'], input[name='password']"
              implicit_wait_ms: 1500
              retry_interval_ms: 150
          - action: Helium.Press
            confirm_progress: false
            params:
              port: "${DEBUG_PORT}"
              key: "DOWN"
          - action: Helium.Press
            confirm_progress: false
            params:
              port: "${DEBUG_PORT}"
              key: "ENTER"

      - name: Click Sign in
        action: Helium.Click
        confirm_after_wait_ms: 1200
        params:
          port: "${DEBUG_PORT}"
          element:
            kind: button
            text: "Sign in"
          implicit_wait_ms: 8000
          retry_interval_ms: 250

  - name: Trial signup form (autonomous, best-effort)
    if_not: "${odoo_url_meta_pre.is_instance}"
    steps:
      - name: Only when not on login page
        if_not: "${login_page_meta.ok}"
        steps:
          - name: Wait for trial email field
            action: Helium.WaitUntil
            confirm_progress: false
            params:
              port: "${DEBUG_PORT}"
              timeout_secs: 25
              interval_ms: 300
              exists:
                kind: s
                selector: "input#email, input[id*='email' i], input[type='email'], input[name*='email' i], input[autocomplete='email'], input[placeholder*='mail' i]"

          - name: Focus trial email field
            action: Helium.ClickNative
            confirm_progress: false
            params:
              port: "${DEBUG_PORT}"
              element:
                kind: s
                selector: "input#email, input[id*='email' i], input[type='email'], input[name*='email' i], input[autocomplete='email'], input[placeholder*='mail' i]"
              implicit_wait_ms: 8000
              retry_interval_ms: 200

          - name: Fill trial email (from secrets)
            if: "${TRIAL_EMAIL}"
            action: Helium.Write
            confirm_after_wait_ms: 500
            params:
              port: "${DEBUG_PORT}"
              text: "${TRIAL_EMAIL}"
              into:
                kind: s
                selector: "input#email, input[id*='email' i], input[type='email'], input[name*='email' i], input[autocomplete='email'], input[placeholder*='mail' i]"
              implicit_wait_ms: 8000
              retry_interval_ms: 200

          - name: Track trial email source from secrets
            if: "${TRIAL_EMAIL}"
            action: Set
            confirm_progress: false
            params:
              name: TRIAL_EMAIL_SOURCE
              value: "secrets.odoo.trial_email"

          - name: Pick trial email from browser saved autofill (best-effort)
            if_not: "${TRIAL_EMAIL}"
            confirm_progress: false
            steps:
              - name: Select first suggestion
                action: Helium.Press
                confirm_progress: false
                params:
                  port: "${DEBUG_PORT}"
                  key: "DOWN"
              - name: Accept suggestion
                action: Helium.Press
                confirm_progress: false
                params:
                  port: "${DEBUG_PORT}"
                  key: "ENTER"
              - name: Read selected trial email value
                action: Helium.GetValue
                register: trial_email_val
                confirm_progress: false
                params:
                  port: "${DEBUG_PORT}"
                  element:
                    kind: s
                    selector: "input#email, input[id*='email' i], input[type='email'], input[name*='email' i], input[autocomplete='email'], input[placeholder*='mail' i]"
              - name: Export selected email into context
                action: Set
                confirm_progress: false
                params:
                  name: TRIAL_EMAIL
                  value: "${trial_email_val.value}"

              - name: Track trial email source from browser autofill
                if: "${trial_email_val.value}"
                action: Set
                confirm_progress: false
                params:
                  name: TRIAL_EMAIL_SOURCE
                  value: "browser_autofill"

          - name: Fallback TRIAL_EMAIL from ODOO_LOGIN_EMAIL
            if_not: "${TRIAL_EMAIL}"
            if: "${ODOO_LOGIN_EMAIL}"
            action: Set
            confirm_progress: false
            params:
              name: TRIAL_EMAIL
              value: "${ODOO_LOGIN_EMAIL}"

          - name: Track trial email source from login credential
            if_not: "${TRIAL_EMAIL_SOURCE}"
            if: "${TRIAL_EMAIL}"
            action: Set
            confirm_progress: false
            params:
              name: TRIAL_EMAIL_SOURCE
              value: "secrets.odoo.login_email"

          - name: Validate trial email policy (must be a usable inbox)
            if: "${TRIAL_EMAIL}"
            action: Shell.RunJson
            register: trial_email_policy
            confirm_progress: false
            params:
              command: 'powershell -NoProfile -Command "$e = (''${TRIAL_EMAIL}'' | Out-String).Trim().ToLower(); $ok = $true; $reason = ''ok''; if ($e -eq '''') { $ok = $false; $reason = ''missing'' } elseif ($e -match ''@users\.noreply\.github\.com$'' -or $e -match ''(^|[^a-z])no-?reply([^a-z]|$)'') { $ok = $false; $reason = ''noreply_not_usable'' }; @{ ok = $ok; reason = $reason; email = $e } | ConvertTo-Json -Compress; if ($ok) { exit 0 } else { exit 1 }"'
              allow_fail: true
              unsafe: true

          - name: Abort if trial email violates policy
            if: "${TRIAL_EMAIL}"
            if_not: "${trial_email_policy.json.ok}"
            action: Fail
            params:
              text: |
                TRIAL_EMAIL is not usable for activation links/codes: ${trial_email_policy.json.email}
                Reason: ${trial_email_policy.json.reason}
                Use a real accessible inbox in:
                - ${ROOT_PLAYBOOK_DIR}\secrets.yml
                - ${SCRIPT_DIR}\secrets.yml

          - name: Ensure trial email field is filled
            if: "${TRIAL_EMAIL}"
            action: Helium.Write
            confirm_progress: false
            params:
              port: "${DEBUG_PORT}"
              text: "${TRIAL_EMAIL}"
              into:
                kind: s
                selector: "input#email, input[id*='email' i], input[type='email'], input[name*='email' i], input[autocomplete='email'], input[placeholder*='mail' i]"
              implicit_wait_ms: 2500
              retry_interval_ms: 150

          - name: Abort if trial email is still missing
            if_not: "${TRIAL_EMAIL}"
            action: Fail
            params:
              text: |
                Missing TRIAL_EMAIL (odoo.trial_email), and browser autofill did not provide a value.

                Provide it via:
                - ${SCRIPT_DIR}\\secrets.yml
                - ${ROOT_PLAYBOOK_DIR}\\secrets.yml
                - ${ROOT_PLAYBOOK_DIR}\\.secrets.yml

          - name: Persist trial email used
            if: "${TRIAL_EMAIL}"
            action: FS.WriteText
            confirm_progress: false
            params:
              path: "${OUTPUT_DIR}\\odoo_trial_email_used.txt"
              text: "${TRIAL_EMAIL}"
              overwrite: true

          - name: Persist trial email source
            if: "${TRIAL_EMAIL_SOURCE}"
            action: FS.WriteText
            confirm_progress: false
            params:
              path: "${OUTPUT_DIR}\\odoo_trial_email_source.txt"
              text: "${TRIAL_EMAIL_SOURCE}"
              overwrite: true

          - name: Fill trial phone (optional)
            if: "${TRIAL_PHONE}"
            action: Helium.Write
            ignore_errors: true
            confirm_progress: false
            params:
              port: "${DEBUG_PORT}"
              text: "${TRIAL_PHONE}"
              into:
                kind: s
                selector: "input[type='tel'], input[name*='phone' i], input[autocomplete='tel']"
              implicit_wait_ms: 1500
              retry_interval_ms: 150

          - name: Fill trial phone fallback
            if_not: "${TRIAL_PHONE}"
            action: Helium.Write
            ignore_errors: true
            confirm_progress: false
            params:
              port: "${DEBUG_PORT}"
              text: "+525555555555"
              into:
                kind: s
                selector: "input[type='tel'], input[name*='phone' i], input[autocomplete='tel']"
              implicit_wait_ms: 1500
              retry_interval_ms: 150

          - name: Fill contact name (optional)
            if: "${TRIAL_CONTACT_NAME}"
            action: Helium.Write
            ignore_errors: true
            confirm_progress: false
            params:
              port: "${DEBUG_PORT}"
              text: "${TRIAL_CONTACT_NAME}"
              into:
                kind: s
                selector: "input[name*='name' i], input[autocomplete='name']"
              implicit_wait_ms: 1500
              retry_interval_ms: 150

          - name: Fill company name (optional)
            if: "${TRIAL_COMPANY_NAME}"
            action: Helium.Write
            ignore_errors: true
            confirm_progress: false
            params:
              port: "${DEBUG_PORT}"
              text: "${TRIAL_COMPANY_NAME}"
              into:
                kind: s
                selector: "input[name*='company' i], input[autocomplete='organization']"
              implicit_wait_ms: 1500
              retry_interval_ms: 150

          - name: Submit trial form (deterministic primary selector)
            action: Helium.Click
            register: trial_submit_click
            ignore_errors: true
            confirm_progress: false
            params:
              port: "${DEBUG_PORT}"
              element:
                kind: s
                selector: "button.btn.btn-lg.btn-primary"
              implicit_wait_ms: 4000
              retry_interval_ms: 200

          - name: Submit trial form (localized fallbacks)
            if_not: "${trial_submit_click.ok}"
            loop:
              - "Comienza ahora"
              - "Start now"
              - "Continue"
              - "Create"
              - "Start"
              - "Get started"
              - "Comenzar"
              - "Crear"
              - "Continuar"
            steps:
              - name: Click submit button: ${loop.item}
                action: Helium.Click
                register: trial_submit_click
                ignore_errors: true
                confirm_progress: false
                params:
                  port: "${DEBUG_PORT}"
                  element:
                    kind: button
                    text: "${loop.item}"
                  implicit_wait_ms: 4000
                  retry_interval_ms: 200
              - break_if: "${trial_submit_click.ok}"

          - name: Abort if trial form submit button was not clicked
            if_not: "${trial_submit_click.ok}"
            action: Fail
            params:
              text: |
                Could not click the trial form submit button.

                Evidence:
                - ${OUTPUT_DIR}\\debug_evidence
