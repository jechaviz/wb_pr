steps:
  - name: Ensure WAIBA_PLAYBOOK_LIB_DIR is available
    if_not: "${WAIBA_PLAYBOOK_LIB_DIR}"
    action: Fail
    params:
      text: "Missing WAIBA_PLAYBOOK_LIB_DIR before reusable Odoo branding."

  - name: Apply branding via reusable Odoo RPC skill
    playbook: "${WAIBA_PLAYBOOK_LIB_DIR}\\odoo\\odoo-rpc-playbooks\\playbooks\\02_branding_apply\\playbook.yml"
    with:
      ODOO_BRAND_COMPANY: "Electroprice"
      ODOO_BRAND_WEBSITE: "Electroprice"
      ODOO_CHECKPOINT_PATH: "${OUTPUT_DIR}\\odoo_branding_checkpoint.json"
