variables:
  ODOO_MODULE_NAMES: []
  ODOO_MODULES_INSTALL_TIMEOUT_MS: 360000
  ODOO_MODULES_POLL_MS: 1500
  ODOO_CHECKPOINT_PATH: ""

steps:
  - name: Ensure ODOO_URL exists
    if_not: "${ODOO_URL}"
    action: Fail
    params:
      text: "Missing ODOO_URL before module installation."

  - name: Ensure modules list exists
    if_not: "${ODOO_MODULE_NAMES}"
    action: Fail
    params:
      text: "Missing ODOO_MODULE_NAMES for reusable module installation playbook."

  - name: Connect to Odoo tab
    action: CDP.Connect
    params:
      port: "${DEBUG_PORT}"
      open_url: "${ODOO_URL}"
      target_type: page
      target_url_contains: ".odoo.com"

  - name: Navigate to Odoo instance
    confirm_progress: false
    action: CDP.Navigate
    params:
      port: "${DEBUG_PORT}"
      url: "${ODOO_URL}"
      wait_ms: 1600

  - name: Load reusable Odoo module installer script
    action: FS.ReadText
    register: js_odoo_modules_ensure
    params:
      path: "${PLAYBOOK_DIR}\\..\\..\\assets\\js\\odoo\\rpc_modules_ensure.js"

  - name: Execute reusable Odoo module installer
    action: CDP.EvaluateJson
    register: odoo_modules_ensure_result
    params:
      port: "${DEBUG_PORT}"
      timeout_ms: "${ODOO_MODULES_INSTALL_TIMEOUT_MS}"
      await_promise: true
      expression: "${js_odoo_modules_ensure}"

  - name: Abort if module installation did not complete
    if_not: "${odoo_modules_ensure_result.ok}"
    action: Fail
    params:
      text: "Reusable module installation failed: ${odoo_modules_ensure_result.error}${odoo_modules_ensure_result.reason}"

  - name: Persist modules checkpoint
    if: "${ODOO_CHECKPOINT_PATH}"
    action: FS.WriteJson
    params:
      path: "${ODOO_CHECKPOINT_PATH}"
      overwrite: true
      value:
        ok: "${odoo_modules_ensure_result.ok}"
        odoo_url: "${ODOO_URL}"
        modules: "${ODOO_MODULE_NAMES}"
        install: "${odoo_modules_ensure_result}"
