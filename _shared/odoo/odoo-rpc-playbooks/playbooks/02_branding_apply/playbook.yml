variables:
  ODOO_BRAND_COMPANY: "${PROJECT_NAME}"
  ODOO_BRAND_WEBSITE: "${PROJECT_NAME}"
  ODOO_CHECKPOINT_PATH: ""

steps:
  - name: Ensure ODOO_URL exists
    if_not: "${ODOO_URL}"
    action: Fail
    params:
      text: "Missing ODOO_URL before branding configuration."

  - name: Connect to Odoo tab
    action: CDP.Connect
    params:
      port: "${DEBUG_PORT}"
      open_url: "${ODOO_URL}"
      target_type: page
      target_url_contains: ".odoo.com"

  - name: Navigate to Odoo instance
    confirm_progress: false
    action: CDP.Navigate
    params:
      port: "${DEBUG_PORT}"
      url: "${ODOO_URL}"
      wait_ms: 1200

  - name: Load reusable Odoo branding script
    action: FS.ReadText
    register: js_odoo_branding_apply
    params:
      path: "${PLAYBOOK_DIR}\\..\\..\\assets\\js\\odoo\\rpc_branding_apply.js"

  - name: Execute reusable Odoo branding configuration
    action: CDP.EvaluateJson
    register: odoo_branding_apply_result
    params:
      port: "${DEBUG_PORT}"
      await_promise: true
      expression: "${js_odoo_branding_apply}"

  - name: Abort if branding did not complete
    if_not: "${odoo_branding_apply_result.ok}"
    action: Fail
    params:
      text: "Reusable branding configuration failed: ${odoo_branding_apply_result.error}${odoo_branding_apply_result.reason}"

  - name: Persist branding checkpoint
    if: "${ODOO_CHECKPOINT_PATH}"
    action: FS.WriteJson
    params:
      path: "${ODOO_CHECKPOINT_PATH}"
      overwrite: true
      value:
        ok: "${odoo_branding_apply_result.ok}"
        odoo_url: "${ODOO_URL}"
        company: "${ODOO_BRAND_COMPANY}"
        website: "${ODOO_BRAND_WEBSITE}"
        branding: "${odoo_branding_apply_result}"
