      params:
        port: "${DEBUG_PORT}"
        expression: |
          (() => {
            const path = String(location.pathname || "");
            const onOdooShell = /^\/odoo(\/)?$/i.test(path);
            const selectors = [
              "button.o_menu_toggle",
              ".o_main_navbar .o_navbar_apps_menu button",
              ".o_main_navbar button[aria-label*='Home']",
              ".o_main_navbar .o_menu_brand"
