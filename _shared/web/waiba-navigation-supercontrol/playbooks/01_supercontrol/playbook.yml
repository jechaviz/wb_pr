    - name: Fail if capture surface is still empty
      if_not: "${NAV_ALLOW_EMPTY_CAPTURE}"
      if: "${nav_surface_probe.appears_empty}"
      action: Fail
      params:
        text: "Capture surface still appears empty after render synchronization."

    - name: Prepare final fullpage capture surface when overflow exists
      if: "${NAV_CAPTURE_FULLPAGE_ON_OVERFLOW}"
      action: CDP.EvaluateJson
      ignore_errors: true
      register: nav_final_capture_prepare
      params:
        port: "${DEBUG_PORT}"
        expression: |
          (() => {
            const visible = (el) => {
              if (!el) return false;
              const r = el.getBoundingClientRect();
              const s = getComputedStyle(el);
              return r.width > 0 && r.height > 0 && s.display !== "none" && s.visibility !== "hidden" && s.opacity !== "0";
            };
            const maxExpandedHeightCap = 12000;
            const restore = [];
            const remembered = new WeakSet();
            const remember = (el) => {
              if (!el || remembered.has(el)) return;
              remembered.add(el);
              restore.push({
                el,
                style: el.getAttribute("style") || "",
                scrollTop: typeof el.scrollTop === "number" ? el.scrollTop : 0,
                scrollLeft: typeof el.scrollLeft === "number" ? el.scrollLeft : 0
              });
            };
            const score = (el) => {
              if (!visible(el)) return null;
              const st = getComputedStyle(el);
              const oy = String(st.overflowY || "").toLowerCase();
              const ox = String(st.overflowX || "").toLowerCase();
              const scrollHeight = el.scrollHeight || 0;
              const clientHeight = el.clientHeight || 0;
              const overflow = scrollHeight - clientHeight;
              const byStyle = /auto|scroll|overlay/.test(oy) || /auto|scroll|overlay/.test(ox);
              if (!(overflow > 24 || byStyle)) return null;
              const r = el.getBoundingClientRect();
              return {
                el,
                overflow,
                scrollHeight,
                clientHeight,
                area: (r.width || 0) * (r.height || 0)
              };
            };
            const baseCandidates = [
              document.querySelector(".o_content"),
              document.querySelector(".o_action_manager"),
              document.querySelector(".o_web_client"),
              document.querySelector(".o_setting_container"),
              document.querySelector(".settings"),
              document.querySelector("main"),
              document.querySelector("#wrapwrap"),
              document.scrollingElement,
              document.documentElement,
              document.body
            ].filter((el) => !!el);
            const allOverflow = Array.from(document.querySelectorAll("*")).map(score).filter((v) => !!v);
            const merged = [];
            const seen = new WeakSet();
            for (const el of baseCandidates) {
              const s = score(el);
              if (s && !seen.has(s.el)) {
                seen.add(s.el);
                merged.push(s);
              }
            }
            for (const s of allOverflow) {
              if (!seen.has(s.el)) {
                seen.add(s.el);
                merged.push(s);
              }
            }
            merged.sort((a, b) => (b.overflow - a.overflow) || (b.area - a.area));
            const targets = merged.slice(0, 12);
            for (const t of targets) {
              remember(t.el);
              t.el.scrollTop = 0;
              t.el.scrollLeft = 0;
              t.el.style.overflowY = "visible";
              t.el.style.overflowX = "visible";
              t.el.style.maxHeight = "none";
              const expanded = Math.max(t.clientHeight || 0, Math.min(t.scrollHeight || 0, maxExpandedHeightCap));
              if (expanded > (t.clientHeight || 0) + 8) t.el.style.height = `${expanded}px`;
              t.el.style.minHeight = `${expanded}px`;
              let parent = t.el.parentElement;
              let hops = 0;
              while (parent && hops < 12) {
                remember(parent);
                parent.style.overflow = "visible";
                parent.style.maxHeight = "none";
                parent.style.height = "auto";
                parent = parent.parentElement;
                hops += 1;
              }
            }
            remember(document.body);
            remember(document.documentElement);
            document.body.style.overflow = "visible";
            document.documentElement.style.overflow = "visible";
            const rootExpanded = Math.min(
              maxExpandedHeightCap,
              Math.max(
                document.documentElement.scrollHeight || 0,
                document.body.scrollHeight || 0,
                ...targets.map((t) => t.scrollHeight || 0)
              )
            );
            if (rootExpanded > 0) {
              document.documentElement.style.height = `${rootExpanded}px`;
              document.body.style.height = `${rootExpanded}px`;
              document.documentElement.style.minHeight = `${rootExpanded}px`;
              document.body.style.minHeight = `${rootExpanded}px`;
            }
            document.body.scrollTop = 0;
            document.documentElement.scrollTop = 0;
            window.__waibaCaptureRestore = restore;
            return {
              ok: true,
              has_overflow: targets.length > 0,
              candidate_count: merged.length,
              targets_count: targets.length,
              max_overflow_px: targets.length ? targets[0].overflow : 0,
              max_scroll_height: targets.length ? targets[0].scrollHeight : 0
            };
          })()

    - name: Bootstrap subtitle overlay before final screenshot
      if: "${NAV_ENABLE_SUBTITLE_OVERLAY}"
      if_2: "${nav_subtitle_js_exists}"
      action: CDP.EvaluateJson
      ignore_errors: true
      register: nav_subtitle_bootstrap_final
      params:
        port: "${DEBUG_PORT}"
        expression: "${nav_subtitle_js_code}"

    - name: Set subtitle overlay for final screenshot
      if: "${NAV_ENABLE_SUBTITLE_OVERLAY}"
      if_2: "${nav_subtitle_js_exists}"
      action: CDP.EvaluateJson
      ignore_errors: true
      register: nav_subtitle_final_set
      params:
        port: "${DEBUG_PORT}"
        expression: |
          (() => {
            const api = window.__waibaSubtitleOverlay;
            if (!api || typeof api.set !== "function") return { ok: false, reason: "subtitle_api_missing" };
            const finalUrl = String(location.href || "");
            return api.set({
              visible: true,
              theme: "${NAV_SUBTITLE_THEME}",
              position: "${NAV_SUBTITLE_POSITION}",
              playbook: "${NAV_SUBTITLE_PLAYBOOK_LABEL}",
              step: "Final-capture",
              title: "Final navigation screenshot",
              subtitle: "Post-action UI state",
              intent: "_Intent:_ verify final page context after click/search actions",
              detail: "**URL:** `" + finalUrl + "`",
              show_playbook: false,
              show_timestamp: true
            });
          })()

    - name: Capture final viewport
      action: CDP.Send
      register: nav_capture
      params:
        port: "${DEBUG_PORT}"
        method: "Page.captureScreenshot"
        params:
          format: "png"
          captureBeyondViewport: true

    - name: Save final viewport
      action: FS.WriteBase64
      params:
        path: "${OUTPUT_DIR}\\${NAV_CAPTURE_LABEL}_viewport.png"
        overwrite: true
        base64: "${nav_capture.result.data}"

    - name: Scroll to bottom for overflow-aware final evidence
      if: "${NAV_CAPTURE_FULLPAGE_ON_OVERFLOW}"
      if_2: "${nav_final_capture_prepare.has_overflow}"
      action: CDP.EvaluateJson
      ignore_errors: true
      register: nav_bottom_scroll
      params:
        port: "${DEBUG_PORT}"
        expression: |
          (() => {
            const visible = (el) => {
              if (!el) return false;
              const r = el.getBoundingClientRect();
              const s = getComputedStyle(el);
              return r.width > 0 && r.height > 0 && s.display !== "none" && s.visibility !== "hidden" && s.opacity !== "0";
            };
            const candidates = Array.from(document.querySelectorAll("*"))
              .filter((e) => visible(e))
              .filter((e) => (e.scrollHeight || 0) > (e.clientHeight || 0) + 24)
              .sort((a, b) => ((b.scrollHeight - b.clientHeight) - (a.scrollHeight - a.clientHeight)));
            const targets = candidates.slice(0, 12);
            for (const el of targets) el.scrollTop = Math.max(0, (el.scrollHeight || 0) - (el.clientHeight || 0));
            window.scrollTo(0, Math.max(
              document.documentElement.scrollHeight || 0,
              document.body.scrollHeight || 0
            ));
            return {
              ok: true,
              targets: targets.length,
              url: String(location.href || "")
            };
          })()

    - name: Wait after bottom scroll for overflow-aware final evidence
      if: "${NAV_CAPTURE_FULLPAGE_ON_OVERFLOW}"
      if_2: "${nav_final_capture_prepare.has_overflow}"
      action: CDP.Wait
      params:
        ms: 900

    - name: Set subtitle overlay for final bottom screenshot
      if: "${NAV_ENABLE_SUBTITLE_OVERLAY}"
      if_2: "${NAV_CAPTURE_FULLPAGE_ON_OVERFLOW}"
      action: CDP.EvaluateJson
      ignore_errors: true
      register: nav_subtitle_bottom_set
      params:
        port: "${DEBUG_PORT}"
        expression: |
          (() => {
            const api = window.__waibaSubtitleOverlay;
            if (!api || typeof api.set !== "function") return { ok: false, reason: "subtitle_api_missing" };
            return api.set({
              visible: true,
              theme: "${NAV_SUBTITLE_THEME}",
              position: "${NAV_SUBTITLE_POSITION}",
              playbook: "${NAV_SUBTITLE_PLAYBOOK_LABEL}",
              step: "Final-capture-bottom",
              title: "Bottom overflow evidence",
              subtitle: "Extended viewport capture",
              intent: "_Intent:_ confirm lower sections after auto-scroll",
              detail: "**URL:** `" + String(location.href || "") + "`",
              show_playbook: false,
              show_timestamp: true
            });
          })()

    - name: Capture final viewport bottom
      if: "${NAV_CAPTURE_FULLPAGE_ON_OVERFLOW}"
      if_2: "${nav_final_capture_prepare.has_overflow}"
      action: CDP.Send
      register: nav_capture_bottom
      params:
        port: "${DEBUG_PORT}"
        method: "Page.captureScreenshot"
        params:
          format: "png"
          captureBeyondViewport: true

    - name: Save final viewport bottom
      if: "${NAV_CAPTURE_FULLPAGE_ON_OVERFLOW}"
      if_2: "${nav_final_capture_prepare.has_overflow}"
      action: FS.WriteBase64
      params:
        path: "${OUTPUT_DIR}\\${NAV_CAPTURE_LABEL}_viewport_bottom.png"
        overwrite: true
        base64: "${nav_capture_bottom.result.data}"

    - name: Restore page styles after final capture
      if: "${NAV_CAPTURE_FULLPAGE_ON_OVERFLOW}"
      action: CDP.EvaluateJson
      ignore_errors: true
      register: nav_final_capture_restore
      params:
        port: "${DEBUG_PORT}"
        expression: |
          (() => {
            const restore = Array.isArray(window.__waibaCaptureRestore) ? window.__waibaCaptureRestore : [];
            for (let i = restore.length - 1; i >= 0; i -= 1) {
              const rec = restore[i];
              if (!rec || !rec.el) continue;
              if (rec.style) rec.el.setAttribute("style", rec.style);
              else rec.el.removeAttribute("style");
              if (typeof rec.scrollTop === "number") rec.el.scrollTop = rec.scrollTop;
              if (typeof rec.scrollLeft === "number") rec.el.scrollLeft = rec.scrollLeft;
            }
            delete window.__waibaCaptureRestore;
            return { ok: true, restored: restore.length };
          })()

    - name: Read subtitle overlay state before cleanup
      if: "${NAV_ENABLE_SUBTITLE_OVERLAY}"
      action: CDP.EvaluateJson
      ignore_errors: true
      register: nav_subtitle_state
      params:
        port: "${DEBUG_PORT}"
        expression: |
          (() => {
            const api = window.__waibaSubtitleOverlay;
            if (!api || typeof api.state !== "function") return { ok: false, reason: "subtitle_api_missing" };
            return { ok: true, state: api.state() };
          })()

    - name: Hide subtitle overlay before final DOM probe
      if: "${NAV_ENABLE_SUBTITLE_OVERLAY}"
      action: CDP.EvaluateJson
      ignore_errors: true
      register: nav_subtitle_hide
      params:
        port: "${DEBUG_PORT}"
        expression: |
          (() => {
            const api = window.__waibaSubtitleOverlay;
            if (!api || typeof api.hide !== "function") return { ok: false, reason: "subtitle_api_missing" };
            return api.hide();
          })()

    - name: Capture final DOM probe
      action: Helium.Probe
      register: nav_probe
      params:
        port: "${DEBUG_PORT}"

    - name: Save final DOM probe
      action: FS.WriteJson
      params:
        path: "${OUTPUT_DIR}\\${NAV_CAPTURE_LABEL}_probe.json"
        overwrite: true
        value: "${nav_probe}"

    - name: Verify post hook file
      action: FS.Exists
      register: nav_post_hook_exists
      params:
        path: "${NAV_POST_HOOK_PS1}"

    - name: Run post hook (PowerShell, optional)
      if: "${NAV_ENABLE_POST_HOOK}"
      if_2: "${nav_post_hook_exists}"
      action: Shell.Run
      register: nav_post_hook_result
      params:
        command: "powershell -NoProfile -ExecutionPolicy Bypass -File \"${NAV_POST_HOOK_PS1}\""
        allow_fail: true
        unsafe: true
        timeout_ms: 120000

    - name: Save supercontrol summary
      action: FS.WriteJson
      params:
        path: "${OUTPUT_DIR}\\${NAV_CAPTURE_LABEL}_summary.json"
        overwrite: true
        value:
          nav_url: "${NAV_URL}"
          nav_find_text: "${NAV_FIND_TEXT}"
          nav_click_texts: "${NAV_CLICK_TEXTS}"
          nav_fallback_url: "${NAV_FALLBACK_URL}"
          nav_wait_expr: "${NAV_WAIT_EXPR}"
          find_result: "${nav_find_result}"
          clickany_on_miss: "${nav_clickany_on_miss}"
          clickany_direct: "${nav_clickany_direct}"
          probe: "${nav_probe}"
          pre_hook: "${nav_pre_hook_result}"
          post_hook: "${nav_post_hook_result}"
          shell_result: "${nav_shell_result}"
          js_patch_result: "${nav_js_patch_result}"
          ocr_result: "${nav_pre_ocr}"
          cdp_before_result: "${nav_cdp_before_result}"
          cdp_after_result: "${nav_cdp_after_result}"
          surface_probe: "${nav_surface_probe}"
          subtitle_enabled: "${NAV_ENABLE_SUBTITLE_OVERLAY}"
          subtitle_state: "${nav_subtitle_state}"
          subtitle_pre_set: "${nav_subtitle_pre_set}"
          subtitle_final_set: "${nav_subtitle_final_set}"
          subtitle_bottom_set: "${nav_subtitle_bottom_set}"
