            const hasOnlyShell = !!document.querySelector(".o_main_navbar, .o_web_client") && mainText.length < 30 && visualBlocks < 1;
            const appearsEmpty = hasOnlyShell || (bodyText.length < minChars && mainText.length < Math.max(20, Math.floor(minChars / 2)) && visualBlocks < 2);
            return {
              ok: true,
              url: String(location.href || ""),
              title: String(document.title || ""),
              ready_state: String(document.readyState || ""),
              loading_visible: loadingVisible,
              body_length: bodyText.length,
